<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور - منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .reset-card h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .reset-card p {
            color: #64748b;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: border 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #0f5cbf;
        }
        .btn-reset {
            background: #0f5cbf;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-reset:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #0f5cbf;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .success-message {
            background: #d1fae5;
            color: #10b981;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .loading {
            display: none;
            margin: 20px 0;
        }
        .fa-spinner {
            font-size: 1.5rem;
            color: #0f5cbf;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <i class="fas fa-key" style="font-size: 3rem; color: #0f5cbf; margin-bottom: 15px;"></i>
        <h1>إعادة تعيين كلمة المرور</h1>
        <p>أدخل كلمة المرور الجديدة</p>
        
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>
        
        <div class="input-group">
            <label>كلمة المرور الجديدة</label>
            <input type="password" id="newPassword" placeholder="أدخل كلمة المرور الجديدة">
        </div>
        
        <div class="input-group">
            <label>تأكيد كلمة المرور</label>
            <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور">
        </div>
        
        <div class="loading" id="loading">
            <i class="fas fa-spinner fa-spin"></i> جاري المعالجة...
        </div>
        
        <button class="btn-reset" onclick="resetPassword()">
            <i class="fas fa-save"></i> تغيير كلمة المرور
        </button>
        
        <a href="/" class="back-link">
            <i class="fas fa-arrow-right"></i> العودة إلى تسجيل الدخول
        </a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        const role = urlParams.get('role');

        async function verifyToken() {
            if (!token || !email || !role) {
                showError('رابط إعادة التعيين غير صالح');
                document.querySelector('.btn-reset').disabled = true;
                return;
            }

            try {
                const res = await fetch('/api/verify-reset-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email, role })
                });
                const data = await res.json();
                
                if (!data.success) {
                    showError(data.error || 'رابط إعادة التعيين غير صالح أو منتهي الصلاحية');
                    document.querySelector('.btn-reset').disabled = true;
                }
            } catch(e) {
                showError('حدث خطأ في التحقق من الرابط');
                document.querySelector('.btn-reset').disabled = true;
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            successDiv.style.display = 'block';
        }

        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!newPassword || !confirmPassword) {
                showError('الرجاء إدخال كلمة المرور');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showError('كلمة المرور غير متطابقة');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.querySelector('.btn-reset').disabled = true;
            
            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email, role, new_password: newPassword })
                });
                const data = await res.json();
                
                if (data.success) {
                    showSuccess('تم تغيير كلمة المرور بنجاح! جاري تحويلك إلى صفحة تسجيل الدخول...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    showError(data.error || 'حدث خطأ');
                    document.querySelector('.btn-reset').disabled = false;
                }
            } catch(e) {
                showError('حدث خطأ في الاتصال بالخادم');
                document.querySelector('.btn-reset').disabled = false;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        verifyToken();
    </script>
</body>
</html>
