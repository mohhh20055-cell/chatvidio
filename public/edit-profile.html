<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الملف الشخصي - منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f2f5;
            color: #1c1e21;
        }

        .facebook-nav {
            background: white;
            padding: 8px 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .nav-logo i {
            font-size: 2rem;
            color: #0f5cbf;
        }

        .nav-logo span {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f5cbf;
        }

        .nav-icons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .back-btn {
            background: #e4e6eb;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #d8dadf;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e4e6eb;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
        }

        .user-menu img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .main-container {
            max-width: 1000px;
            margin: 80px auto 40px;
            padding: 0 20px;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .cover-section {
            position: relative;
            height: 200px;
            background: linear-gradient(135deg, #0f5cbf, #1e3c72);
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }

        .cover-overlay {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cover-overlay:hover {
            background: rgba(0,0,0,0.8);
        }

        .avatar-section {
            position: relative;
            padding: 0 20px;
            margin-top: -60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .avatar-container {
            position: relative;
            cursor: pointer;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            background: #e4e6eb;
        }

        .avatar-overlay {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #e4e6eb;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid white;
        }

        .avatar-overlay:hover {
            background: #d8dadf;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .profile-role {
            color: #65676b;
            margin-bottom: 20px;
        }

        .edit-form {
            padding: 0 20px 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1c1e21;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            transition: border 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #0f5cbf;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e4e6eb;
        }

        .save-btn {
            background: #0f5cbf;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            font-size: 1rem;
        }

        .save-btn:hover {
            background: #1e3c72;
        }

        .cancel-btn {
            background: #e4e6eb;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }

        .cancel-btn:hover {
            background: #d8dadf;
        }

        .notification-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 3000;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .loading-spinner {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .loading-spinner i {
            font-size: 2rem;
            color: #0f5cbf;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
        }

        .image-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            z-index: 1501;
            overflow: hidden;
        }

        .image-modal-header {
            padding: 16px;
            border-bottom: 1px solid #e4e6eb;
            font-weight: 700;
            text-align: center;
        }

        .image-modal-option {
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border-bottom: 1px solid #e4e6eb;
            transition: background 0.2s;
        }

        .image-modal-option:hover {
            background: #f0f2f5;
        }

        .image-modal-option i {
            margin-left: 8px;
            color: #0f5cbf;
        }

        .image-modal-cancel {
            padding: 16px;
            text-align: center;
            cursor: pointer;
            color: #ef4444;
            font-weight: 600;
        }

        .image-modal-cancel:hover {
            background: #f0f2f5;
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .avatar-section {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 15px;
            }
            .profile-name {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="facebook-nav">
        <div class="nav-content">
            <div class="nav-logo" onclick="window.location.href='/student-dashboard.html'">
                <i class="fas fa-chalkboard-user"></i>
                <span>منصة التعليم</span>
            </div>
            <div class="nav-icons">
                <button class="back-btn" onclick="window.location.href='/student-dashboard.html'">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </button>
                <div class="user-menu" onclick="logout()">
                    <img id="navAvatar" src="https://via.placeholder.com/28">
                    <i class="fas fa-sign-out-alt" style="font-size: 0.8rem;"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="profile-card">
            <div class="cover-section" id="coverSection">
                <div class="cover-overlay" onclick="showCoverModal()">
                    <i class="fas fa-camera"></i>
                    <span>تغيير صورة الغلاف</span>
                </div>
            </div>

            <div class="avatar-section">
                <div class="avatar-container" onclick="showAvatarModal()">
                    <img id="profileAvatar" class="profile-avatar" src="https://via.placeholder.com/120">
                    <div class="avatar-overlay">
                        <i class="fas fa-camera" style="font-size: 0.8rem;"></i>
                    </div>
                </div>
                <div>
                    <div class="profile-name" id="profileName"></div>
                    <div class="profile-role"><i class="fas fa-graduation-cap"></i> طالب</div>
                </div>
            </div>

            <div class="edit-form">
                <form id="profileForm">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-user"></i> الاسم الكامل</label>
                        <input type="text" id="fullName" class="form-input" placeholder="الاسم الكامل">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                            <input type="email" id="email" class="form-input" readonly disabled style="background: #f0f2f5;">
                        </div>
                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-phone"></i> رقم الهاتف</label>
                            <input type="tel" id="phone" class="form-input" placeholder="رقم الهاتف">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="cancel-btn" onclick="cancelEdit()">إلغاء</button>
                        <button type="submit" class="save-btn"><i class="fas fa-save"></i> حفظ التغييرات</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>
    
    <div id="imageModal" class="image-modal">
        <div class="image-modal-header">تغيير الصورة الشخصية</div>
        <div class="image-modal-option" onclick="uploadFromDevice()">
            <i class="fas fa-upload"></i> رفع من الجهاز
        </div>
        <div class="image-modal-cancel" onclick="closeImageModal()">
            إلغاء
        </div>
    </div>

    <div id="coverModal" class="image-modal">
        <div class="image-modal-header">تغيير صورة الغلاف</div>
        <div class="image-modal-option" onclick="uploadCoverFromDevice()">
            <i class="fas fa-upload"></i> رفع من الجهاز
        </div>
        <div class="image-modal-cancel" onclick="closeCoverModal()">
            إلغاء
        </div>
    </div>

    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
    <input type="file" id="coverInput" accept="image/*" style="display: none;">

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p style="margin-top: 10px;">جاري الحفظ...</p>
        </div>
    </div>

    <div id="notificationToast" class="notification-toast"></div>

    <script>
        let userData = null;
        let studentId = null;
        let currentAvatarFile = null;

        function showNotification(message, type = 'success') {
            const toast = document.getElementById('notificationToast');
            toast.style.background = type === 'success' ? '#10b981' : (type === 'warning' ? '#f59e0b' : '#ef4444');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        async function loadUserData() {
            try {
                const storedData = localStorage.getItem('userData');
                if (storedData) {
                    userData = JSON.parse(storedData);
                    studentId = userData.id;
                }

                if (!studentId) {
                    window.location.href = '/';
                    return;
                }

                const res = await fetch(`/api/student/${studentId}`);
                const data = await res.json();
                
                if (data.error) {
                    showNotification('خطأ في تحميل البيانات', 'error');
                    return;
                }

                userData = data;
                updateUI();
            } catch(e) {
                console.error(e);
                showNotification('حدث خطأ في تحميل البيانات', 'error');
            }
        }

        function updateUI() {
            if (!userData) return;
            
            document.getElementById('profileName').innerText = userData.full_name || 'طالب';
            document.getElementById('fullName').value = userData.full_name || '';
            document.getElementById('email').value = userData.email || '';
            document.getElementById('phone').value = userData.phone || '';
            
            // تحديث صورة البروفايل
            if (userData.profile_image) {
                const avatarUrl = `/uploads/profiles/${userData.profile_image}`;
                document.getElementById('profileAvatar').src = avatarUrl;
                document.getElementById('navAvatar').src = avatarUrl;
                console.log('تم تحميل الصورة من:', avatarUrl);
            } else {
                document.getElementById('profileAvatar').src = 'https://via.placeholder.com/120';
                document.getElementById('navAvatar').src = 'https://via.placeholder.com/28';
            }
            
            // تحديث صورة الغلاف
            if (userData.cover_image) {
                const coverUrl = `/uploads/covers/${userData.cover_image}`;
                document.getElementById('coverSection').style.backgroundImage = `url(${coverUrl})`;
                document.getElementById('coverSection').style.backgroundSize = 'cover';
                document.getElementById('coverSection').style.backgroundPosition = 'center';
            } else {
                document.getElementById('coverSection').style.background = 'linear-gradient(135deg, #0f5cbf, #1e3c72)';
            }
        }

        function showAvatarModal() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('imageModal').style.display = 'block';
        }

        function uploadFromDevice() {
            closeImageModal();
            document.getElementById('avatarInput').click();
        }

        document.getElementById('avatarInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showNotification('الرجاء اختيار صورة فقط', 'error');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                showNotification('حجم الصورة يجب أن لا يتجاوز 5 ميجابايت', 'error');
                return;
            }
            
            currentAvatarFile = file;
            
            // معاينة الصورة مؤقتاً
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('profileAvatar').src = e.target.result;
            };
            reader.readAsDataURL(file);
            
            await uploadAvatar();
        });

        async function uploadAvatar() {
            if (!currentAvatarFile) return;
            
            showLoading();
            const formData = new FormData();
            formData.append('student_id', studentId);
            formData.append('profile_image', currentAvatarFile);
            formData.append('full_name', document.getElementById('fullName').value);
            formData.append('phone', document.getElementById('phone').value);
            
            try {
                const res = await fetch('/api/student/update-profile', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    showNotification('تم تحديث الصورة بنجاح', 'success');
                    if (data.user) {
                        userData = data.user;
                        localStorage.setItem('userData', JSON.stringify(data.user));
                        updateUI();
                    }
                    currentAvatarFile = null;
                } else {
                    showNotification(data.error || 'حدث خطأ', 'error');
                    // إعادة تحميل الصورة القديمة
                    updateUI();
                }
            } catch(e) {
                showNotification('حدث خطأ في الاتصال', 'error');
                updateUI();
            } finally {
                hideLoading();
            }
        }

        function showCoverModal() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('coverModal').style.display = 'block';
        }

        function uploadCoverFromDevice() {
            closeCoverModal();
            document.getElementById('coverInput').click();
        }

        document.getElementById('coverInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showNotification('الرجاء اختيار صورة فقط', 'error');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                showNotification('حجم الصورة يجب أن لا يتجاوز 5 ميجابايت', 'error');
                return;
            }
            
            showLoading();
            const formData = new FormData();
            formData.append('student_id', studentId);
            formData.append('cover_image', file);
            
            try {
                const res = await fetch('/api/student/update-cover', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    showNotification('تم تحديث صورة الغلاف بنجاح', 'success');
                    if (data.user) {
                        userData = data.user;
                        localStorage.setItem('userData', JSON.stringify(data.user));
                        updateUI();
                    }
                } else {
                    showNotification(data.error || 'حدث خطأ', 'error');
                }
            } catch(e) {
                showNotification('حدث خطأ في الاتصال', 'error');
            } finally {
                hideLoading();
            }
        });

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            showLoading();
            const formData = new FormData();
            formData.append('student_id', studentId);
            formData.append('full_name', document.getElementById('fullName').value);
            formData.append('phone', document.getElementById('phone').value);
            
            try {
                const res = await fetch('/api/student/update-profile', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    showNotification('تم حفظ التغييرات بنجاح', 'success');
                    if (data.user) {
                        userData = data.user;
                        localStorage.setItem('userData', JSON.stringify(data.user));
                        updateUI();
                    }
                } else {
                    showNotification(data.error || 'حدث خطأ', 'error');
                }
            } catch(e) {
                showNotification('حدث خطأ في الاتصال', 'error');
            } finally {
                hideLoading();
            }
        });

        function cancelEdit() {
            if (userData) {
                document.getElementById('fullName').value = userData.full_name || '';
                document.getElementById('phone').value = userData.phone || '';
                updateUI();
                showNotification('تم إلغاء التعديلات', 'warning');
            } else {
                window.location.href = '/student-dashboard.html';
            }
        }

        function closeImageModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('imageModal').style.display = 'none';
        }

        function closeCoverModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('coverModal').style.display = 'none';
        }

        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = '/';
        }

        loadUserData();
    </script>
</body>
</html>
