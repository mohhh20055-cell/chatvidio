<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الأستاذ - منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1e3c72, #0f5cbf); color: white; padding: 40px; border-radius: 30px; text-align: center; margin-bottom: 30px; position: relative; }
        .profile-image { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid white; margin-top: -70px; cursor: pointer; transition: transform 0.3s; }
        .profile-image:hover { transform: scale(1.05); }
        .social-links { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .social-links a { color: white; font-size: 28px; transition: 0.3s; }
        .social-links a:hover { transform: scale(1.1); }
        .back-btn { background: #0f5cbf; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; display: inline-block; transition: 0.3s; }
        .back-btn:hover { background: #1e3c72; transform: translateX(-5px); }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .post-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .post-image { max-width: 100%; border-radius: 15px; margin: 10px 0; cursor: pointer; transition: transform 0.3s; }
        .post-image:hover { transform: scale(1.02); }
        .post-file, .post-link { background: #e2e8f0; padding: 8px 15px; border-radius: 20px; text-decoration: none; color: #0f5cbf; display: inline-block; margin: 5px; transition: 0.3s; }
        .post-file:hover, .post-link:hover { background: #0f5cbf; color: white; }
        .like-btn, .comment-btn { background: none; border: none; cursor: pointer; font-size: 16px; margin: 5px; padding: 5px 10px; border-radius: 20px; transition: 0.3s; }
        .like-btn:hover, .comment-btn:hover { background: #f0f2f5; }
        .like-btn.liked { color: #ef4444; }
        .comment-section { margin-top: 15px; }
        .comment-input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 20px; margin-top: 10px; }
        .comments-list { margin-top: 10px; max-height: 200px; overflow-y: auto; }
        .comment-item { background: #f8fafc; padding: 8px 12px; border-radius: 10px; margin-top: 5px; border-right: 3px solid #0f5cbf; }
        .comment-item strong { color: #0f5cbf; }
        .login-warning { background: #fef3c7; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .login-warning a { color: #0f5cbf; font-weight: bold; }
        @media (max-width: 768px) {
            .posts-grid { grid-template-columns: 1fr; }
            .header { padding: 20px; }
            .profile-image { width: 100px; height: 100px; margin-top: -40px; }
        }
        .follow-btn { background: #0f5cbf; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .follow-btn:hover { transform: scale(1.05); }
        .follow-btn.following { background: #10b981; color: white; }
        .follow-btn.following:hover { background: #059669; }
        .loading { text-align: center; padding: 50px; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        .modal h3 { margin-bottom: 15px; color: #1e3c72; }
        .modal textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid #cbd5e1; font-family: 'Cairo', sans-serif; resize: vertical; }
        .modal button { background: #0f5cbf; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; transition: 0.3s; }
        .modal button:hover { background: #1e3c72; }
        .cancel-modal { background: #e2e8f0 !important; color: #4a5568 !important; margin-top: 10px; }
        .cancel-modal:hover { background: #cbd5e1 !important; }
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .offer-badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-right: 10px;
        }
        .message-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            margin-right: 10px;
            transition: 0.3s;
        }
        .message-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }
        .notification-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 3000;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='/'"><i class="fas fa-arrow-right"></i> العودة للرئيسية</button>
        
        <div id="contentArea">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل بيانات الأستاذ...</div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="commentModal" class="modal">
        <h3><i class="fas fa-comment"></i> إضافة تعليق</h3>
        <textarea id="commentText" rows="3" placeholder="اكتب تعليقك..."></textarea>
        <button onclick="submitComment()">نشر التعليق</button>
        <button class="cancel-modal" onclick="closeModal()">إلغاء</button>
    </div>

    <div id="messageModal" class="modal">
        <h3><i class="fas fa-envelope"></i> إرسال رسالة إلى الأستاذ</h3>
        <textarea id="messageText" rows="4" placeholder="اكتب رسالتك هنا..."></textarea>
        <button onclick="sendMessage()">إرسال الرسالة</button>
        <button class="cancel-modal" onclick="closeMessageModal()">إلغاء</button>
    </div>

    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <img id="fullImage" src="">
    </div>

    <div id="notificationToast" class="notification-toast"></div>

    <script>
        // ============= جلب بيانات المستخدم من الجلسة الحالية =============
        let userData = null;
        let studentToken = null;
        let token = null;
        let isLoggedIn = false;
        let studentId = null;
        let userRole = null;

        function loadSessionData() {
            try {
                const storedData = localStorage.getItem('userData');
                if (storedData) {
                    userData = JSON.parse(storedData);
                    studentId = userData.id;
                    userRole = userData.role;
                }
                
                studentToken = localStorage.getItem('studentToken');
                token = localStorage.getItem('token');
                
                // التحقق من صحة الجلسة: إذا كان هناك توكن أو بيانات مستخدم
                isLoggedIn = !!(studentToken || token || (userData && userData.id));
                
                console.log('🔍 بيانات الجلسة:', { 
                    isLoggedIn, 
                    studentId, 
                    userRole,
                    hasStudentToken: !!studentToken,
                    hasToken: !!token
                });
                
                return { isLoggedIn, studentId, userRole, userData };
            } catch(e) {
                console.error('خطأ في قراءة الجلسة:', e);
                return { isLoggedIn: false, studentId: null, userRole: null, userData: null };
            }
        }

        // تحميل بيانات الجلسة فوراً
        let session = loadSessionData();
        isLoggedIn = session.isLoggedIn;
        studentId = session.studentId;
        userRole = session.userRole;
        userData = session.userData;

        // ============= باقي الكود =============
        const urlParams = new URLSearchParams(window.location.search);
        const teacherId = urlParams.get('id');
        
        console.log('🔍 معرف الأستاذ من الرابط:', teacherId);
        
        if (!teacherId) {
            document.getElementById('contentArea').innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i> لم يتم تحديد الأستاذ المطلوب
                </div>
                <button class="back-btn" onclick="window.location.href='/'">العودة للرئيسية</button>
            `;
        }
        
        let isFollowing = false;
        let activeCommentPostId = null;

        function showNotification(message, type = 'success') {
            const toast = document.getElementById('notificationToast');
            toast.style.background = type === 'success' ? '#10b981' : (type === 'warning' ? '#f59e0b' : '#ef4444');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        function showFullImage(src) {
            document.getElementById('fullImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        async function loadTeacher() {
            try {
                const res = await fetch(`/api/teacher/${teacherId}`);
                if (!res.ok) throw new Error('فشل تحميل البيانات');
                const teacher = await res.json();
                
                if (teacher.error) {
                    document.getElementById('contentArea').innerHTML = `
                        <div class="error-message">
                            <i class="fas fa-exclamation-triangle"></i> ${teacher.error}
                        </div>
                        <button class="back-btn" onclick="window.location.href='/'">العودة للرئيسية</button>
                    `;
                    return;
                }
                
                const imageUrl = teacher.profile_url || 'https://via.placeholder.com/150';
                
                let socialHtml = '';
                if (teacher.facebook_url) socialHtml += `<a href="${teacher.facebook_url}" target="_blank"><i class="fab fa-facebook"></i></a>`;
                if (teacher.instagram_url) socialHtml += `<a href="${teacher.instagram_url}" target="_blank"><i class="fab fa-instagram"></i></a>`;
                if (teacher.linkedin_url) socialHtml += `<a href="${teacher.linkedin_url}" target="_blank"><i class="fab fa-linkedin"></i></a>`;
                if (teacher.website_url) socialHtml += `<a href="${teacher.website_url}" target="_blank"><i class="fas fa-globe"></i></a>`;
                
                let followButtonHtml = '';
                let messageButtonHtml = '';
                
                // ✅ إذا كان المستخدم مسجلاً للدخول ودوره طالب
                if (isLoggedIn && userRole === 'student') {
                    await checkFollowStatus();
                    followButtonHtml = `<button id="followBtn" class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow()">
                        ${isFollowing ? '✅ متابع' : '➕ متابعة'}
                    </button>`;
                    messageButtonHtml = `<button class="message-btn" onclick="showMessageModal()"><i class="fas fa-envelope"></i> مراسلة الأستاذ</button>`;
                }
                
                // جلب إحصائيات الأستاذ
                let statsHtml = '';
                try {
                    const postsRes = await fetch(`/api/posts/${teacherId}`);
                    const posts = await postsRes.json();
                    const totalPosts = posts.length;
                    const totalLikes = posts.reduce((sum, p) => sum + (p.likes_count || 0), 0);
                    statsHtml = `
                        <div class="stats-row">
                            <div class="stat-item">
                                <div class="stat-number">${totalPosts}</div>
                                <div class="stat-label">دروس ومنشورات</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${totalLikes}</div>
                                <div class="stat-label">إعجاب</div>
                            </div>
                        </div>
                    `;
                } catch(e) { console.log(e); }
                
                document.getElementById('contentArea').innerHTML = `
                    <div class="header">
                        <div class="social-links">${socialHtml}</div>
                        <img src="${imageUrl}" class="profile-image" onclick="showFullImage('${imageUrl}')" onerror="this.src='https://via.placeholder.com/150'">
                        <h1>${escapeHtml(teacher.full_name)}</h1>
                        <p><i class="fas fa-book"></i> ${escapeHtml(teacher.specialization || 'تخصص عام')}</p>
                        <p>${escapeHtml(teacher.bio || 'لا توجد نبذة')}</p>
                        <p><i class="fas fa-briefcase"></i> ${teacher.experience || '0'} سنة خبرة</p>
                        <p><i class="fas fa-phone"></i> ${teacher.phone || 'غير محدد'}</p>
                        ${statsHtml}
                        <div>
                            ${followButtonHtml}
                            ${messageButtonHtml}
                        </div>
                    </div>
                    ${!isLoggedIn ? `<div class="login-warning">
                        <i class="fas fa-info-circle"></i> يرجى <a href="/">تسجيل الدخول</a> للتمكن من الإعجاب والتعليق ومتابعة الأستاذ
                    </div>` : ''}
                    <h2><i class="fas fa-newspaper"></i> الدروس والمنشورات</h2>
                    <div id="postsList" class="posts-grid">
                        <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنشورات...</div>
                    </div>
                `;
                
                loadPosts();
            } catch(e) {
                console.error('خطأ في تحميل الأستاذ:', e);
                document.getElementById('contentArea').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل بيانات الأستاذ
                    </div>
                    <button class="back-btn" onclick="window.location.href='/'">العودة للرئيسية</button>
                `;
            }
        }

        function showMessageModal() {
            if (!isLoggedIn || userRole !== 'student') {
                showNotification('يرجى تسجيل الدخول كطالب أولاً', 'error');
                window.location.href = '/';
                return;
            }
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('messageModal').style.display = 'block';
            document.getElementById('messageText').value = '';
        }

        function closeMessageModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('messageModal').style.display = 'none';
        }

        async function sendMessage() {
            if (!isLoggedIn || userRole !== 'student') {
                showNotification('يرجى تسجيل الدخول كطالب أولاً', 'error');
                window.location.href = '/';
                return;
            }
            
            const message = document.getElementById('messageText').value.trim();
            if (!message) {
                showNotification('الرجاء كتابة رسالتك', 'error');
                return;
            }
            
            try {
                const res = await fetch('/api/messages/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sender_id: studentId,
                        sender_type: 'student',
                        receiver_id: teacherId,
                        receiver_type: 'teacher',
                        message: message
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    showNotification('تم إرسال رسالتك بنجاح', 'success');
                    closeMessageModal();
                } else {
                    showNotification(data.error || 'حدث خطأ', 'error');
                }
            } catch(e) {
                showNotification('حدث خطأ في الاتصال', 'error');
            }
        }

        async function checkFollowStatus() {
            if (!isLoggedIn || userRole !== 'student') return;
            try {
                const res = await fetch(`/api/check-follow/${studentId}/${teacherId}`);
                const data = await res.json();
                isFollowing = data.following;
            } catch(e) { console.log(e); }
        }

        async function toggleFollow() {
            if (!isLoggedIn || userRole !== 'student') { 
                showNotification('يرجى تسجيل الدخول أولاً', 'error');
                window.location.href = '/';
                return; 
            }
            const url = isFollowing ? '/api/unfollow' : '/api/follow';
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId, teacher_id: teacherId })
            });
            isFollowing = !isFollowing;
            const btn = document.getElementById('followBtn');
            if (isFollowing) {
                btn.innerHTML = '✅ متابع';
                btn.classList.add('following');
                showNotification('تمت المتابعة بنجاح', 'success');
            } else {
                btn.innerHTML = '➕ متابعة';
                btn.classList.remove('following');
                showNotification('تم إلغاء المتابعة', 'warning');
            }
        }

        async function loadPosts() {
            try {
                const res = await fetch(`/api/posts/${teacherId}`);
                const posts = await res.json();
                const container = document.getElementById('postsList');
                if (posts.length === 0) { 
                    container.innerHTML = '<p style="text-align:center">لا توجد منشورات حالياً</p>'; 
                    return; 
                }
                
                let html = '';
                for (const post of posts) {
                    let liked = false;
                    if (isLoggedIn && userRole === 'student') {
                        try {
                            const likeRes = await fetch(`/api/post/check-like/${post.id}/${studentId}`);
                            const likeData = await likeRes.json();
                            liked = likeData.liked;
                        } catch(e) {}
                    }
                    html += `<div class="post-card" id="post-${post.id}">
                        <h3>${escapeHtml(post.title)}</h3>
                        <p>${escapeHtml(post.content)}</p>
                        ${post.image_url ? `<img src="${post.image_url}" class="post-image" onclick="event.stopPropagation(); showFullImage('${post.image_url}')">` : ''}
                        ${post.file_url ? `<a href="${post.file_url}" class="post-file" download><i class="fas fa-download"></i> تحميل الملف</a>` : ''}
                        ${post.link_url ? `<a href="${post.link_url}" target="_blank" class="post-link"><i class="fas fa-link"></i> رابط مفيد</a>` : ''}
                        <div>
                            <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike(${post.id})" ${!isLoggedIn || userRole !== 'student' ? 'disabled style="opacity:0.5"' : ''}><i class="fas fa-heart"></i> <span id="likes-${post.id}">${post.likes_count || 0}</span></button>
                            <button class="comment-btn" onclick="showCommentModal(${post.id})" ${!isLoggedIn || userRole !== 'student' ? 'disabled style="opacity:0.5"' : ''}><i class="fas fa-comment"></i> تعليق</button>
                        </div>
                        <div id="comments-${post.id}" class="comments-list"></div>
                    </div>`;
                    loadComments(post.id);
                }
                container.innerHTML = html;
            } catch(e) {
                console.error('خطأ في تحميل المنشورات:', e);
                document.getElementById('postsList').innerHTML = '<p style="text-align:center">حدث خطأ في تحميل المنشورات</p>';
            }
        }

        async function toggleLike(postId) {
            if (!isLoggedIn || userRole !== 'student') { 
                showNotification('يرجى تسجيل الدخول كطالب أولاً', 'error');
                window.location.href = '/';
                return; 
            }
            const btn = document.querySelector(`#post-${postId} .like-btn`);
            const isLiked = btn.classList.contains('liked');
            const url = isLiked ? '/api/post/unlike' : '/api/post/like';
            await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ post_id: postId, student_id: studentId }) 
            });
            const res = await fetch(`/api/posts/${teacherId}`);
            const posts = await res.json();
            const post = posts.find(p => p.id === postId);
            document.getElementById(`likes-${postId}`).innerText = post.likes_count || 0;
            btn.classList.toggle('liked');
        }

        function showCommentModal(postId) {
            if (!isLoggedIn || userRole !== 'student') { 
                showNotification('يرجى تسجيل الدخول كطالب أولاً', 'error');
                window.location.href = '/';
                return; 
            }
            activeCommentPostId = postId;
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('commentModal').style.display = 'block';
            document.getElementById('commentText').value = '';
        }

        async function submitComment() {
            const comment = document.getElementById('commentText').value.trim();
            if (!comment) { showNotification('الرجاء كتابة تعليق', 'error'); return; }
            await fetch('/api/post/comment', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ post_id: activeCommentPostId, student_id: studentId, comment }) 
            });
            closeModal();
            loadComments(activeCommentPostId);
            showNotification('تم نشر تعليقك', 'success');
        }

        async function loadComments(postId) {
            try {
                const res = await fetch(`/api/post/${postId}`);
                const post = await res.json();
                const container = document.getElementById(`comments-${postId}`);
                if (post.comments && post.comments.length > 0) {
                    let html = '';
                    post.comments.forEach(c => { 
                        html += `<div class="comment-item"><strong><i class="fas fa-user-circle"></i> ${escapeHtml(c.student_name)}</strong><br>${escapeHtml(c.comment)}</div>`; 
                    });
                    container.innerHTML = html;
                } else { 
                    container.innerHTML = ''; 
                }
            } catch(e) { console.log(e); }
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('commentModal').style.display = 'none';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        if (teacherId) {
            loadTeacher();
        }
    </script>
</body>
</html>
