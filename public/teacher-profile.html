<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الأستاذ - منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1e3c72, #0f5cbf); color: white; padding: 40px; border-radius: 30px; text-align: center; margin-bottom: 30px; position: relative; }
        .profile-image { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid white; margin-top: -70px; cursor: pointer; transition: transform 0.3s; }
        .profile-image:hover { transform: scale(1.05); }
        .social-links { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .social-links a { color: white; font-size: 28px; transition: 0.3s; }
        .social-links a:hover { transform: scale(1.1); }
        .back-btn { 
            background: #0f5cbf; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 30px; 
            cursor: pointer; 
            margin-bottom: 20px; 
            display: inline-block; 
            transition: 0.3s; 
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }
        .back-btn:hover { background: #1e3c72; transform: translateX(-5px); }
        
        /* ===== عروض الأستاذ ===== */
        .offers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .offer-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .offer-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .offer-card .subject { font-size: 1.2rem; font-weight: 700; color: #1e3c72; }
        .offer-card .price { font-size: 1.5rem; font-weight: 800; color: #0f5cbf; }
        .offer-card .price.free { color: #10b981; }
        .offer-card .badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-upcoming { background: #fef3c7; color: #d97706; }
        .badge-live { background: #fee2e2; color: #dc2626; animation: pulse 1.5s infinite; }
        .badge-completed { background: #d1fae5; color: #059669; }
        .badge-free { background: #dbeafe; color: #2563eb; }
        .badge-teacher-ready { background: #ede9fe; color: #7c3aed; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .offer-date { color: #6b7280; font-size: 0.9rem; margin: 5px 0; }
        .offer-duration { display: inline-block; background: #e2e8f0; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; color: #4a5568; }
        .waiting-count { font-size: 0.8rem; color: #6b7280; margin-top: 5px; }
        .book-btn { 
            background: #0f5cbf; 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
        }
        .book-btn:hover { background: #1e3c72; transform: scale(1.05); }
        .book-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .book-btn.free { background: #10b981; }
        .book-btn.free:hover { background: #059669; }
        .book-btn.booked { background: #6b7280; cursor: default; }
        .book-btn.booked:hover { transform: none; }

        .login-warning { background: #fef3c7; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .login-warning a { color: #0f5cbf; font-weight: bold; }
        @media (max-width: 768px) {
            .offers-grid { grid-template-columns: 1fr; }
            .header { padding: 20px; }
            .profile-image { width: 100px; height: 100px; margin-top: -40px; }
        }
        .follow-btn { 
            background: #0f5cbf; 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.3s; 
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
        }
        .follow-btn:hover { transform: scale(1.05); }
        .follow-btn.following { background: #10b981; color: white; }
        .follow-btn.following:hover { background: #059669; }
        .loading { text-align: center; padding: 50px; color: #6b7280; }
        .loading i { font-size: 2rem; color: #0f5cbf; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        .modal h3 { margin-bottom: 15px; color: #1e3c72; }
        .modal textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid #cbd5e1; font-family: 'Cairo', sans-serif; resize: vertical; }
        .modal button { background: #0f5cbf; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; transition: 0.3s; font-family: 'Cairo', sans-serif; }
        .modal button:hover { background: #1e3c72; }
        .cancel-modal { background: #e2e8f0 !important; color: #4a5568 !important; margin-top: 10px; }
        .cancel-modal:hover { background: #cbd5e1 !important; }
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .message-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            margin-right: 10px;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
        }
        .message-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }
        .notification-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 3000;
            display: none;
            animation: slideIn 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.3rem;
            color: #1e3c72;
        }
        .section-title .count-badge {
            background: #0f5cbf;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            background: white;
            border-radius: 20px;
        }
        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        
        <div id="contentArea">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل بيانات الأستاذ...</div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>

    <div id="messageModal" class="modal">
        <h3><i class="fas fa-envelope"></i> إرسال رسالة إلى الأستاذ</h3>
        <textarea id="messageText" rows="4" placeholder="اكتب رسالتك هنا..."></textarea>
        <button onclick="sendMessage()">إرسال الرسالة</button>
        <button class="cancel-modal" onclick="closeMessageModal()">إلغاء</button>
    </div>

    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <img id="fullImage" src="">
    </div>

    <div id="notificationToast" class="notification-toast"></div>

    <script>
        // ============= جلب بيانات المستخدم من الجلسة الحالية =============
        let userData = null;
        let studentToken = null;
        let token = null;
        let isLoggedIn = false;
        let studentId = null;
        let userRole = null;

        function loadSessionData() {
            try {
                const storedData = localStorage.getItem('userData');
                if (storedData) {
                    userData = JSON.parse(storedData);
                    studentId = userData.id;
                    userRole = userData.role;
                }
                
                studentToken = localStorage.getItem('studentToken');
                token = localStorage.getItem('token');
                
                isLoggedIn = !!(studentToken || token || (userData && userData.id));
                
                console.log('🔍 بيانات الجلسة:', { 
                    isLoggedIn, 
                    studentId, 
                    userRole,
                    hasStudentToken: !!studentToken,
                    hasToken: !!token
                });
                
                return { isLoggedIn, studentId, userRole, userData };
            } catch(e) {
                console.error('خطأ في قراءة الجلسة:', e);
                return { isLoggedIn: false, studentId: null, userRole: null, userData: null };
            }
        }

        let session = loadSessionData();
        isLoggedIn = session.isLoggedIn;
        studentId = session.studentId;
        userRole = session.userRole;
        userData = session.userData;

        // ============= باقي الكود =============
        const urlParams = new URLSearchParams(window.location.search);
        const teacherId = urlParams.get('id');
        
        console.log('🔍 معرف الأستاذ من الرابط:', teacherId);
        
        if (!teacherId) {
            document.getElementById('contentArea').innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i> لم يتم تحديد الأستاذ المطلوب
                </div>
                <a href="index.html" class="back-btn">العودة للرئيسية</a>
            `;
        }
        
        let isFollowing = false;
        let bookedOffers = new Set();

        function showNotification(message, type = 'success') {
            const toast = document.getElementById('notificationToast');
            toast.style.background = type === 'success' ? '#10b981' : (type === 'warning' ? '#f59e0b' : '#ef4444');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        function showFullImage(src) {
            document.getElementById('fullImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function showMessageModal() {
            if (!isLoggedIn || userRole !== 'student') {
                showNotification('يرجى تسجيل الدخول كطالب أولاً', 'error');
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('messageModal').style.display = 'block';
            document.getElementById('messageText').value = '';
        }

        function closeMessageModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('messageModal').style.display = 'none';
        }

        async function sendMessage() {
            if (!isLoggedIn || userRole !== 'student') {
                showNotification('يرجى تسجيل الدخول كطالب أولاً', 'error');
                window.location.href = 'index.html';
                return;
            }
            
            const message = document.getElementById('messageText').value.trim();
            if (!message) {
                showNotification('الرجاء كتابة رسالتك', 'error');
                return;
            }
            
            try {
                const res = await fetch('/api/messages/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sender_id: studentId,
                        sender_type: 'student',
                        receiver_id: teacherId,
                        receiver_type: 'teacher',
                        message: message
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    showNotification('تم إرسال رسالتك بنجاح', 'success');
                    closeMessageModal();
                } else {
                    showNotification(data.error || 'حدث خطأ', 'error');
                }
            } catch(e) {
                showNotification('حدث خطأ في الاتصال', 'error');
            }
        }

        async function checkFollowStatus() {
            if (!isLoggedIn || userRole !== 'student') return;
            try {
                const res = await fetch(`/api/check-follow/${studentId}/${teacherId}`);
                const data = await res.json();
                isFollowing = data.following;
            } catch(e) { console.log(e); }
        }

        async function toggleFollow() {
            if (!isLoggedIn || userRole !== 'student') { 
                showNotification('يرجى تسجيل الدخول أولاً', 'error');
                window.location.href = 'index.html';
                return; 
            }
            const url = isFollowing ? '/api/unfollow' : '/api/follow';
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId, teacher_id: teacherId })
            });
            isFollowing = !isFollowing;
            const btn = document.getElementById('followBtn');
            if (isFollowing) {
                btn.innerHTML = '✅ متابع';
                btn.classList.add('following');
                showNotification('تمت المتابعة بنجاح', 'success');
            } else {
                btn.innerHTML = '➕ متابعة';
                btn.classList.remove('following');
                showNotification('تم إلغاء المتابعة', 'warning');
            }
        }

        // ============= تحميل الأستاذ وعروضه =============
        async function loadTeacher() {
            try {
                const res = await fetch(`/api/teacher/${teacherId}`);
                if (!res.ok) throw new Error('فشل تحميل البيانات');
                const teacher = await res.json();
                
                if (teacher.error) {
                    document.getElementById('contentArea').innerHTML = `
                        <div class="error-message">
                            <i class="fas fa-exclamation-triangle"></i> ${teacher.error}
                        </div>
                        <a href="index.html" class="back-btn">العودة للرئيسية</a>
                    `;
                    return;
                }
                
                const imageUrl = teacher.profile_url || 'https://via.placeholder.com/150';
                
                let socialHtml = '';
                if (teacher.facebook_url) socialHtml += `<a href="${teacher.facebook_url}" target="_blank"><i class="fab fa-facebook"></i></a>`;
                if (teacher.instagram_url) socialHtml += `<a href="${teacher.instagram_url}" target="_blank"><i class="fab fa-instagram"></i></a>`;
                if (teacher.linkedin_url) socialHtml += `<a href="${teacher.linkedin_url}" target="_blank"><i class="fab fa-linkedin"></i></a>`;
                if (teacher.website_url) socialHtml += `<a href="${teacher.website_url}" target="_blank"><i class="fas fa-globe"></i></a>`;
                
                let followButtonHtml = '';
                let messageButtonHtml = '';
                
                if (isLoggedIn && userRole === 'student') {
                    await checkFollowStatus();
                    followButtonHtml = `<button id="followBtn" class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow()">
                        ${isFollowing ? '✅ متابع' : '➕ متابعة'}
                    </button>`;
                    messageButtonHtml = `<button class="message-btn" onclick="showMessageModal()"><i class="fas fa-envelope"></i> مراسلة الأستاذ</button>`;
                }
                
                // جلب العروض بدلاً من المنشورات
                const offersRes = await fetch(`/api/teacher/offers/${teacherId}`);
                const offers = await offersRes.json();
                const totalOffers = offers ? offers.length : 0;
                
                // حساب إحصائيات العروض
                const now = new Date();
                const upcomingOffers = offers ? offers.filter(o => new Date(o.offer_date) > now && o.status !== 'completed' && o.status !== 'live') : [];
                const liveOffers = offers ? offers.filter(o => o.status === 'live' || o.status === 'teacher_ready') : [];
                
                // جلب حجوزات الطالب الحالية (للتحقق من الحجز)
                if (isLoggedIn && userRole === 'student') {
                    try {
                        const bookingsRes = await fetch(`/api/student/bookings/${studentId}`);
                        const bookings = await bookingsRes.json();
                        bookings.forEach(b => {
                            if (b.offer_id) bookedOffers.add(b.offer_id);
                        });
                    } catch(e) { console.log(e); }
                }
                
                document.getElementById('contentArea').innerHTML = `
                    <div class="header">
                        <div class="social-links">${socialHtml}</div>
                        <img src="${imageUrl}" class="profile-image" onclick="showFullImage('${imageUrl}')" onerror="this.src='https://via.placeholder.com/150'">
                        <h1>${escapeHtml(teacher.full_name)}</h1>
                        <p><i class="fas fa-book"></i> ${escapeHtml(teacher.specialization || 'تخصص عام')}</p>
                        <p>${escapeHtml(teacher.bio || 'لا توجد نبذة')}</p>
                        <p><i class="fas fa-briefcase"></i> ${teacher.experience || '0'} سنة خبرة</p>
                        <p><i class="fas fa-phone"></i> ${teacher.phone || 'غير محدد'}</p>
                        <div class="stats-row">
                            <div class="stat-item">
                                <div class="stat-number">${totalOffers}</div>
                                <div class="stat-label">إجمالي العروض</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${upcomingOffers.length}</div>
                                <div class="stat-label">عروض قادمة</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${liveOffers.length}</div>
                                <div class="stat-label">عروض مباشرة</div>
                            </div>
                        </div>
                        <div>
                            ${followButtonHtml}
                            ${messageButtonHtml}
                        </div>
                    </div>
                    ${!isLoggedIn ? `<div class="login-warning">
                        <i class="fas fa-info-circle"></i> يرجى <a href="index.html">تسجيل الدخول</a> للتمكن من حجز العروض ومتابعة الأستاذ
                    </div>` : ''}
                    <div class="section-title">
                        <i class="fas fa-calendar-alt" style="color: #0f5cbf;"></i>
                        عروض الأستاذ
                        <span class="count-badge">${totalOffers}</span>
                    </div>
                    <div id="offersList" class="offers-grid">
                        ${renderOffers(offers)}
                    </div>
                `;
                
            } catch(e) {
                console.error('خطأ في تحميل الأستاذ:', e);
                document.getElementById('contentArea').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل بيانات الأستاذ
                    </div>
                    <a href="index.html" class="back-btn">العودة للرئيسية</a>
                `;
            }
        }

        function renderOffers(offers) {
            if (!offers || offers.length === 0) {
                return `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <i class="fas fa-calendar-times"></i>
                        <p>لا توجد عروض حالياً</p>
                        <p style="font-size: 0.8rem; color: #9ca3af;">سيتم إضافة عروض قريباً</p>
                    </div>
                `;
            }
            
            let html = '';
            const now = new Date();
            
            for (const offer of offers) {
                const offerDate = new Date(offer.offer_date);
                const isPast = offerDate < now && offer.status !== 'live';
                const isFree = offer.is_free === 1 || offer.is_free === true;
                const isBooked = bookedOffers.has(offer.id);
                
                let statusBadge = '';
                let statusClass = '';
                
                if (offer.status === 'live' || offer.status === 'teacher_ready') {
                    statusBadge = `<span class="badge badge-live">🔴 مباشر</span>`;
                    statusClass = 'badge-live';
                } else if (offer.status === 'completed' || isPast) {
                    statusBadge = `<span class="badge badge-completed">✅ منتهية</span>`;
                    statusClass = 'badge-completed';
                } else if (offer.status === 'upcoming') {
                    statusBadge = `<span class="badge badge-upcoming">⏳ قادمة</span>`;
                    statusClass = 'badge-upcoming';
                } else {
                    statusBadge = `<span class="badge badge-upcoming">⏳ قادمة</span>`;
                }
                
                // التحقق من إمكانية الحجز
                let canBook = !isPast && offer.status !== 'completed' && !isBooked;
                let bookButtonText = 'حجز الآن';
                let bookButtonClass = '';
                
                if (isBooked) {
                    bookButtonText = '✅ محجوز';
                    canBook = false;
                } else if (isFree) {
                    bookButtonText = '🎁 حجز مجاني';
                    bookButtonClass = 'free';
                }
                
                if (!isLoggedIn || userRole !== 'student') {
                    canBook = false;
                }
                
                const priceDisplay = isFree ? '🎁 مجانية' : `${offer.price || 0} دج`;
                const priceClass = isFree ? 'free' : '';
                
                html += `
                    <div class="offer-card">
                        <div>
                            <span class="subject">${escapeHtml(offer.subject_name)}</span>
                            ${statusBadge}
                            ${isFree ? '<span class="badge badge-free">🎁 مجاني</span>' : ''}
                        </div>
                        <div class="offer-date">
                            <i class="fas fa-calendar-day"></i> ${offerDate.toLocaleDateString('ar')} 
                            <i class="fas fa-clock" style="margin-right: 8px;"></i> ${offerDate.toLocaleTimeString('ar', {hour: '2-digit', minute: '2-digit'})}
                        </div>
                        <div>
                            <span class="offer-duration"><i class="fas fa-hourglass-half"></i> ${offer.duration || 30} دقيقة</span>
                            <span class="price ${priceClass}" style="margin-right: 10px;"><i class="fas fa-coins"></i> ${priceDisplay}</span>
                        </div>
                        <div class="waiting-count">
                            <i class="fas fa-users"></i> <span id="waiting-${offer.id}">0</span> طالب في الانتظار
                        </div>
                        <button class="book-btn ${bookButtonClass} ${isBooked ? 'booked' : ''}" 
                                onclick="bookOffer(${offer.id})" 
                                ${!canBook ? 'disabled' : ''}>
                            ${bookButtonText}
                        </button>
                    </div>
                `;
                
                // تحميل عدد المنتظرين
                loadWaitingCount(offer.id);
            }
            
            return html;
        }

        async function loadWaitingCount(offerId) {
            try {
                const res = await fetch(`/api/waiting-count/${offerId}`);
                const data = await res.json();
                const el = document.getElementById(`waiting-${offerId}`);
                if (el) el.textContent = data.count || 0;
            } catch(e) { console.log(e); }
        }

        async function bookOffer(offerId) {
            if (!isLoggedIn || userRole !== 'student') {
                showNotification('يرجى تسجيل الدخول كطالب أولاً', 'error');
                window.location.href = 'index.html';
                return;
            }
            
            const btn = document.querySelector(`.book-btn[onclick="bookOffer(${offerId})"]`);
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
            
            try {
                const res = await fetch('/api/booking/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ offer_id: offerId, student_id: studentId })
                });
                const data = await res.json();
                
                if (data.success) {
                    showNotification(data.message || '✅ تم الحجز بنجاح!', 'success');
                    btn.innerHTML = '✅ محجوز';
                    btn.classList.add('booked');
                    btn.disabled = true;
                    bookedOffers.add(offerId);
                    
                    // تحديث عدد المنتظرين
                    loadWaitingCount(offerId);
                } else {
                    showNotification(data.error || 'حدث خطأ في الحجز', 'error');
                    btn.innerHTML = data.is_free ? '🎁 حجز مجاني' : 'حجز الآن';
                    btn.disabled = false;
                }
            } catch(e) {
                showNotification('حدث خطأ في الاتصال', 'error');
                btn.innerHTML = 'حجز الآن';
                btn.disabled = false;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        if (teacherId) {
            loadTeacher();
        }
    </script>
</body>
</html>
