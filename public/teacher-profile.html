<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الأستاذ - منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1e3c72, #0f5cbf); color: white; padding: 40px; border-radius: 30px; text-align: center; margin-bottom: 30px; }
        .profile-image { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid white; margin-top: -70px; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .social-links a { color: white; font-size: 28px; transition: 0.3s; }
        .social-links a:hover { transform: scale(1.1); }
        .back-btn { background: #0f5cbf; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; display: inline-block; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .post-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .post-image { max-width: 100%; border-radius: 15px; margin: 10px 0; }
        .post-file, .post-link { background: #e2e8f0; padding: 8px 15px; border-radius: 20px; text-decoration: none; color: #0f5cbf; display: inline-block; margin: 5px; }
        .like-btn, .comment-btn { background: none; border: none; cursor: pointer; font-size: 16px; margin: 5px; padding: 5px 10px; border-radius: 20px; transition: 0.3s; }
        .like-btn.liked { color: #ef4444; }
        .comment-section { margin-top: 15px; }
        .comment-input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 20px; margin-top: 10px; }
        .comments-list { margin-top: 10px; }
        .comment-item { background: #f8fafc; padding: 8px; border-radius: 10px; margin-top: 5px; }
        .login-warning { background: #fef3c7; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .login-warning a { color: #0f5cbf; font-weight: bold; }
        @media (max-width: 768px) {
            .posts-grid { grid-template-columns: 1fr; }
            .header { padding: 20px; }
            .profile-image { width: 100px; height: 100px; margin-top: -40px; }
        }
        .follow-btn { background: #0f5cbf; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin-top: 15px; }
        .follow-btn.following { background: #e2e8f0; color: #4a5568; }
        .loading { text-align: center; padding: 50px; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='/'"><i class="fas fa-arrow-right"></i> العودة للرئيسية</button>
        
        <div id="contentArea">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل بيانات الأستاذ...</div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:999;"></div>
    <div id="commentModal" class="modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:20px; z-index:1000; width:90%; max-width:400px;">
        <h3><i class="fas fa-comment"></i> إضافة تعليق</h3>
        <textarea id="commentText" rows="3" placeholder="اكتب تعليقك..." style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;"></textarea>
        <button onclick="submitComment()" style="background:#0f5cbf; color:white; border:none; padding:10px; border-radius:10px; width:100%; cursor:pointer;">نشر التعليق</button>
        <button onclick="closeModal()" style="margin-top:10px; width:100%; background:#e2e8f0; border:none; padding:10px; border-radius:10px; cursor:pointer;">إلغاء</button>
    </div>

    <script>
        // الحصول على معرف الأستاذ من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const teacherId = urlParams.get('id');
        
        console.log('🔍 معرف الأستاذ من الرابط:', teacherId);
        
        if (!teacherId) {
            document.getElementById('contentArea').innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i> لم يتم تحديد الأستاذ المطلوب
                </div>
                <button class="back-btn" onclick="window.location.href='/'">العودة للرئيسية</button>
            `;
        }
        
        // الحصول على بيانات المستخدم المسجل
        let userData = JSON.parse(localStorage.getItem('userData') || '{}');
        let studentToken = localStorage.getItem('studentToken');
        let token = localStorage.getItem('token');
        
        let isLoggedIn = !!(studentToken || token || userData.id);
        let studentId = userData.id;
        let isFollowing = false;
        let activeCommentPostId = null;
        
        console.log('🔍 حالة تسجيل الدخول:', { isLoggedIn, studentId, userData });

        async function loadTeacher() {
            try {
                const res = await fetch(`/api/teacher/${teacherId}`);
                if (!res.ok) throw new Error('فشل تحميل البيانات');
                const teacher = await res.json();
                
                if (teacher.error) {
                    document.getElementById('contentArea').innerHTML = `
                        <div class="error-message">
                            <i class="fas fa-exclamation-triangle"></i> ${teacher.error}
                        </div>
                        <button class="back-btn" onclick="window.location.href='/'">العودة للرئيسية</button>
                    `;
                    return;
                }
                
                const imageUrl = teacher.profile_image ? `/uploads/${teacher.profile_image}` : 'https://via.placeholder.com/150';
                
                let socialHtml = '';
                if (teacher.facebook_url) socialHtml += `<a href="${teacher.facebook_url}" target="_blank"><i class="fab fa-facebook"></i></a>`;
                if (teacher.instagram_url) socialHtml += `<a href="${teacher.instagram_url}" target="_blank"><i class="fab fa-instagram"></i></a>`;
                if (teacher.linkedin_url) socialHtml += `<a href="${teacher.linkedin_url}" target="_blank"><i class="fab fa-linkedin"></i></a>`;
                if (teacher.website_url) socialHtml += `<a href="${teacher.website_url}" target="_blank"><i class="fas fa-globe"></i></a>`;
                
                let followButtonHtml = '';
                if (isLoggedIn) {
                    await checkFollowStatus();
                    followButtonHtml = `<button id="followBtn" class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow()">
                        ${isFollowing ? '✅ متابع' : '➕ متابعة'}
                    </button>`;
                }
                
                document.getElementById('contentArea').innerHTML = `
                    <div class="header">
                        <div class="social-links">${socialHtml}</div>
                        <img src="${imageUrl}" class="profile-image" onerror="this.src='https://via.placeholder.com/150'">
                        <h1>${escapeHtml(teacher.full_name)}</h1>
                        <p><i class="fas fa-book"></i> ${escapeHtml(teacher.specialization || 'تخصص عام')}</p>
                        <p>${escapeHtml(teacher.bio || 'لا توجد نبذة')}</p>
                        <p><i class="fas fa-briefcase"></i> ${teacher.experience || '0'} سنة خبرة</p>
                        ${followButtonHtml}
                    </div>
                    ${!isLoggedIn ? `<div class="login-warning">
                        <i class="fas fa-info-circle"></i> يرجى <a href="/">تسجيل الدخول</a> للتمكن من الإعجاب والتعليق ومتابعة الأستاذ
                    </div>` : ''}
                    <h2><i class="fas fa-newspaper"></i> الدروس والمنشورات</h2>
                    <div id="postsList" class="posts-grid">
                        <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنشورات...</div>
                    </div>
                `;
                
                loadPosts();
            } catch(e) {
                console.error('خطأ في تحميل الأستاذ:', e);
                document.getElementById('contentArea').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل بيانات الأستاذ
                    </div>
                    <button class="back-btn" onclick="window.location.href='/'">العودة للرئيسية</button>
                `;
            }
        }

        async function checkFollowStatus() {
            if (!isLoggedIn) return;
            try {
                const res = await fetch(`/api/check-follow/${studentId}/${teacherId}`);
                const data = await res.json();
                isFollowing = data.following;
            } catch(e) { console.log(e); }
        }

        async function toggleFollow() {
            if (!isLoggedIn) { alert('يرجى تسجيل الدخول أولاً'); return; }
            const url = isFollowing ? '/api/unfollow' : '/api/follow';
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId, teacher_id: teacherId })
            });
            isFollowing = !isFollowing;
            const btn = document.getElementById('followBtn');
            if (isFollowing) {
                btn.innerHTML = '✅ متابع';
                btn.classList.add('following');
            } else {
                btn.innerHTML = '➕ متابعة';
                btn.classList.remove('following');
            }
        }

        async function loadPosts() {
            try {
                const res = await fetch(`/api/posts/${teacherId}`);
                const posts = await res.json();
                const container = document.getElementById('postsList');
                if (posts.length === 0) { 
                    container.innerHTML = '<p style="text-align:center">لا توجد منشورات حالياً</p>'; 
                    return; 
                }
                
                let html = '';
                for (const post of posts) {
                    let liked = false;
                    if (isLoggedIn) {
                        try {
                            const likeRes = await fetch(`/api/post/check-like/${post.id}/${studentId}`);
                            const likeData = await likeRes.json();
                            liked = likeData.liked;
                        } catch(e) {}
                    }
                    html += `<div class="post-card" id="post-${post.id}">
                        <h3>${escapeHtml(post.title)}</h3>
                        <p>${escapeHtml(post.content)}</p>
                        ${post.image_url ? `<img src="${post.image_url}" class="post-image">` : ''}
                        ${post.file_url ? `<a href="${post.file_url}" class="post-file" download><i class="fas fa-download"></i> تحميل الملف</a>` : ''}
                        ${post.link_url ? `<a href="${post.link_url}" target="_blank" class="post-link"><i class="fas fa-link"></i> رابط مفيد</a>` : ''}
                        <div>
                            <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike(${post.id})" ${!isLoggedIn ? 'disabled style="opacity:0.5"' : ''}><i class="fas fa-heart"></i> <span id="likes-${post.id}">${post.likes_count || 0}</span></button>
                            <button class="comment-btn" onclick="showCommentModal(${post.id})" ${!isLoggedIn ? 'disabled style="opacity:0.5"' : ''}><i class="fas fa-comment"></i> تعليق</button>
                        </div>
                        <div id="comments-${post.id}" class="comments-list"></div>
                    </div>`;
                    loadComments(post.id);
                }
                container.innerHTML = html;
            } catch(e) {
                console.error('خطأ في تحميل المنشورات:', e);
                document.getElementById('postsList').innerHTML = '<p style="text-align:center">حدث خطأ في تحميل المنشورات</p>';
            }
        }

        async function toggleLike(postId) {
            if (!isLoggedIn) { alert('يرجى تسجيل الدخول أولاً'); return; }
            const btn = document.querySelector(`#post-${postId} .like-btn`);
            const isLiked = btn.classList.contains('liked');
            const url = isLiked ? '/api/post/unlike' : '/api/post/like';
            await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ post_id: postId, student_id: studentId }) 
            });
            const res = await fetch(`/api/posts/${teacherId}`);
            const posts = await res.json();
            const post = posts.find(p => p.id === postId);
            document.getElementById(`likes-${postId}`).innerText = post.likes_count || 0;
            btn.classList.toggle('liked');
        }

        function showCommentModal(postId) {
            if (!isLoggedIn) { alert('يرجى تسجيل الدخول أولاً'); return; }
            activeCommentPostId = postId;
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('commentModal').style.display = 'block';
            document.getElementById('commentText').value = '';
        }

        async function submitComment() {
            const comment = document.getElementById('commentText').value;
            if (!comment.trim()) { alert('الرجاء كتابة تعليق'); return; }
            await fetch('/api/post/comment', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ post_id: activeCommentPostId, student_id: studentId, comment }) 
            });
            closeModal();
            loadComments(activeCommentPostId);
        }

        async function loadComments(postId) {
            try {
                const res = await fetch(`/api/post/${postId}`);
                const post = await res.json();
                const container = document.getElementById(`comments-${postId}`);
                if (post.comments && post.comments.length > 0) {
                    let html = '';
                    post.comments.forEach(c => { 
                        html += `<div class="comment-item"><strong>${escapeHtml(c.student_name)}</strong>: ${escapeHtml(c.comment)}</div>`; 
                    });
                    container.innerHTML = html;
                } else { 
                    container.innerHTML = ''; 
                }
            } catch(e) { console.log(e); }
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('commentModal').style.display = 'none';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // بدء التحميل
        if (teacherId) {
            loadTeacher();
        }
    </script>
</body>
</html>
