<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأستاذ - منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        .dashboard { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1e3c72, #0f5cbf); color: white; padding: 20px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .nav-tab { padding: 10px 20px; background: #e2e8f0; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .nav-tab.active { background: #0f5cbf; color: white; }
        .create-btn { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-size: 1rem; margin-bottom: 20px; }
        .offers-grid, .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .profile-section { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 30px; }
        .profile-image { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #0f5cbf; }
        .edit-profile-btn { background: #0f5cbf; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin-top: 10px; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .social-links a { color: #0f5cbf; font-size: 24px; transition: 0.3s; }
        .post-image { max-width: 100%; border-radius: 15px; margin: 10px 0; }
        .post-file { background: #e2e8f0; padding: 8px 15px; border-radius: 20px; text-decoration: none; color: #0f5cbf; display: inline-block; margin: 5px; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; z-index: 1000; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .modal input, .modal textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 10px; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        .comment-item { background: #f8fafc; padding: 10px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .delete-comment { background: none; border: none; color: #ef4444; cursor: pointer; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 12px; background: #f59e0b; color: white; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1><i class="fas fa-chalkboard-user"></i> لوحة الأستاذ</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('profile')"><i class="fas fa-user"></i> ملفي الشخصي</button>
            <button class="nav-tab" onclick="showTab('posts')"><i class="fas fa-newspaper"></i> منشوراتي</button>
            <button class="nav-tab" onclick="showTab('offers')"><i class="fas fa-calendar-alt"></i> عروضي</button>
        </div>

        <div id="profileTab">
            <div class="profile-section" id="profileInfo"></div>
        </div>

        <div id="postsTab" style="display: none;">
            <button class="create-btn" onclick="showCreatePostModal()"><i class="fas fa-plus"></i> نشر درس جديد</button>
            <div id="postsList" class="posts-grid"></div>
        </div>

        <div id="offersTab" style="display: none;">
            <button class="create-btn" onclick="showCreateOfferModal()"><i class="fas fa-plus"></i> إنشاء عرض جديد</button>
            <div id="offersList" class="offers-grid"></div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>
    
    <div id="editProfileModal" class="modal">
        <h3><i class="fas fa-user-edit"></i> تعديل الملف الشخصي</h3>
        <input type="text" id="editFullName" placeholder="الاسم الكامل">
        <input type="text" id="editSpecialization" placeholder="التخصص">
        <input type="text" id="editExperience" placeholder="سنوات الخبرة">
        <input type="tel" id="editPhone" placeholder="رقم الهاتف">
        <textarea id="editBio" placeholder="نبذة عنك" rows="3"></textarea>
        <input type="url" id="editFacebook" placeholder="رابط فيسبوك">
        <input type="url" id="editInstagram" placeholder="رابط انستغرام">
        <input type="url" id="editLinkedin" placeholder="رابط لينكد إن">
        <input type="url" id="editWebsite" placeholder="رابط موقع شخصي">
        <input type="file" id="editProfileImage" accept="image/*">
        <button class="create-btn" onclick="updateProfile()" style="background:#0f5cbf">حفظ التغييرات</button>
        <button onclick="closeModal()" style="background:#e2e8f0; color:#333; padding:10px; border:none; border-radius:10px; margin-top:10px; width:100%">إلغاء</button>
    </div>

    <div id="createPostModal" class="modal">
        <h3><i class="fas fa-newspaper"></i> نشر درس جديد</h3>
        <input type="text" id="postTitle" placeholder="عنوان الدرس">
        <textarea id="postContent" placeholder="محتوى الدرس..." rows="5"></textarea>
        <input type="url" id="postLink" placeholder="رابط مفيد (اختياري)">
        <input type="file" id="postImage" accept="image/*">
        <input type="file" id="postFile">
        <button class="create-btn" onclick="createPost()" style="background:#0f5cbf">نشر</button>
        <button onclick="closeModal()" style="background:#e2e8f0; color:#333; padding:10px; border:none; border-radius:10px; margin-top:10px; width:100%">إلغاء</button>
    </div>

    <div id="createOfferModal" class="modal">
        <h3><i class="fas fa-video"></i> إنشاء عرض جديد</h3>
        <input type="text" id="subjectName" placeholder="اسم المادة">
        <input type="number" id="duration" placeholder="مدة الحصة (بالدقائق)" value="60">
        <input type="datetime-local" id="offerDate">
        <div><input type="checkbox" id="isFree" onchange="togglePrice()"> <label>حصة مجانية</label></div>
        <input type="number" id="price" placeholder="السعر (دج)" value="1000">
        <button class="create-btn" onclick="createOffer()" style="background:#0f5cbf">إنشاء العرض</button>
        <button onclick="closeModal()" style="background:#e2e8f0; color:#333; padding:10px; border:none; border-radius:10px; margin-top:10px; width:100%">إلغاء</button>
    </div>

    <script>
        // التحقق من وجود teacherToken و role صحيح
        let teacherToken = localStorage.getItem('teacherToken');
        let userData = JSON.parse(localStorage.getItem('userData') || '{}');
        
        if (!teacherToken && userData.role !== 'teacher') {
            window.location.href = '/';
        }
        
        let teacherData = userData;

        function showTab(tab) {
            document.getElementById('profileTab').style.display = 'none';
            document.getElementById('postsTab').style.display = 'none';
            document.getElementById('offersTab').style.display = 'none';
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            if (tab === 'profile') { document.getElementById('profileTab').style.display = 'block'; document.querySelector('.nav-tab:nth-child(1)').classList.add('active'); loadProfile(); }
            else if (tab === 'posts') { document.getElementById('postsTab').style.display = 'block'; document.querySelector('.nav-tab:nth-child(2)').classList.add('active'); loadPosts(); }
            else { document.getElementById('offersTab').style.display = 'block'; document.querySelector('.nav-tab:nth-child(3)').classList.add('active'); loadOffers(); }
        }

        async function loadProfile() {
            const res = await fetch(`/api/teacher/${teacherData.id}`);
            const teacher = await res.json();
            const imageUrl = teacher.profile_image ? `/uploads/${teacher.profile_image}` : 'https://via.placeholder.com/120';
            document.getElementById('profileInfo').innerHTML = `
                <img src="${imageUrl}" class="profile-image">
                <h2>${teacher.full_name}</h2>
                <p><i class="fas fa-book"></i> ${teacher.specialization || 'تخصص غير محدد'}</p>
                <p><i class="fas fa-briefcase"></i> ${teacher.experience || '0'} سنة خبرة</p>
                <p><i class="fas fa-phone"></i> ${teacher.phone || 'غير محدد'}</p>
                <p><i class="fas fa-align-left"></i> ${teacher.bio || 'لا توجد نبذة'}</p>
                <div class="social-links">
                    ${teacher.facebook_url ? `<a href="${teacher.facebook_url}" target="_blank"><i class="fab fa-facebook"></i></a>` : ''}
                    ${teacher.instagram_url ? `<a href="${teacher.instagram_url}" target="_blank"><i class="fab fa-instagram"></i></a>` : ''}
                    ${teacher.linkedin_url ? `<a href="${teacher.linkedin_url}" target="_blank"><i class="fab fa-linkedin"></i></a>` : ''}
                    ${teacher.website_url ? `<a href="${teacher.website_url}" target="_blank"><i class="fas fa-globe"></i></a>` : ''}
                </div>
                <button class="edit-profile-btn" onclick="showEditProfileModal()"><i class="fas fa-edit"></i> تعديل الملف الشخصي</button>
            `;
        }

        function showEditProfileModal() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('editProfileModal').style.display = 'block';
            fetch(`/api/teacher/${teacherData.id}`).then(res=>res.json()).then(t=>{
                document.getElementById('editFullName').value = t.full_name || '';
                document.getElementById('editSpecialization').value = t.specialization || '';
                document.getElementById('editExperience').value = t.experience || '';
                document.getElementById('editPhone').value = t.phone || '';
                document.getElementById('editBio').value = t.bio || '';
                document.getElementById('editFacebook').value = t.facebook_url || '';
                document.getElementById('editInstagram').value = t.instagram_url || '';
                document.getElementById('editLinkedin').value = t.linkedin_url || '';
                document.getElementById('editWebsite').value = t.website_url || '';
            });
        }

        async function updateProfile() {
            const formData = new FormData();
            formData.append('teacher_id', teacherData.id);
            formData.append('full_name', document.getElementById('editFullName').value);
            formData.append('specialization', document.getElementById('editSpecialization').value);
            formData.append('experience', document.getElementById('editExperience').value);
            formData.append('phone', document.getElementById('editPhone').value);
            formData.append('bio', document.getElementById('editBio').value);
            formData.append('facebook_url', document.getElementById('editFacebook').value);
            formData.append('instagram_url', document.getElementById('editInstagram').value);
            formData.append('linkedin_url', document.getElementById('editLinkedin').value);
            formData.append('website_url', document.getElementById('editWebsite').value);
            if (document.getElementById('editProfileImage').files[0]) {
                formData.append('profile_image', document.getElementById('editProfileImage').files[0]);
            }
            const res = await fetch('/api/teacher/update-profile', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) { alert('تم تحديث الملف الشخصي'); closeModal(); loadProfile(); }
            else alert('خطأ: ' + data.error);
        }

        async function loadPosts() {
            const res = await fetch(`/api/posts/${teacherData.id}`);
            const posts = await res.json();
            const container = document.getElementById('postsList');
            if (posts.length === 0) { container.innerHTML = '<p style="text-align:center">لا توجد منشورات حالياً. قم بنشر درس جديد!</p>'; return; }
            let html = '';
            for (const post of posts) {
                html += `<div class="card">
                    <h3>${post.title}</h3>
                    <p>${post.content}</p>
                    ${post.image_url ? `<img src="${post.image_url}" class="post-image">` : ''}
                    ${post.file_url ? `<a href="${post.file_url}" class="post-file" download><i class="fas fa-download"></i> تحميل الملف</a>` : ''}
                    ${post.link_url ? `<a href="${post.link_url}" target="_blank" class="post-file"><i class="fas fa-link"></i> رابط مفيد</a>` : ''}
                    <p><small><i class="fas fa-heart"></i> ${post.likes_count || 0} إعجاب | <i class="fas fa-comment"></i> ${post.comments_count || 0} تعليق</small></p>
                    <button class="delete-btn" onclick="deletePost(${post.id})"><i class="fas fa-trash"></i> حذف المنشور</button>
                    <div id="comments-${post.id}"></div>
                </div>`;
                loadComments(post.id);
            }
            container.innerHTML = html;
        }

        async function loadComments(postId) {
            const res = await fetch(`/api/post/${postId}`);
            const post = await res.json();
            const container = document.getElementById(`comments-${postId}`);
            if (post.comments && post.comments.length > 0) {
                let html = '<hr><h4>التعليقات:</h4>';
                post.comments.forEach(c => {
                    html += `<div class="comment-item">
                        <div><strong>${c.student_name}</strong>: ${c.comment}</div>
                        <button class="delete-comment" onclick="deleteComment(${c.id}, ${postId})"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
                });
                container.innerHTML = html;
            }
        }

        async function deleteComment(commentId, postId) {
            if (confirm('هل أنت متأكد من حذف هذا التعليق؟')) {
                await fetch(`/api/post/comment/${commentId}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ teacher_id: teacherData.id, post_id: postId }) });
                loadPosts();
            }
        }

        async function deletePost(postId) {
            if (confirm('هل أنت متأكد من حذف هذا المنشور؟')) {
                await fetch(`/api/post/${postId}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ teacher_id: teacherData.id }) });
                loadPosts();
            }
        }

        function showCreatePostModal() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('createPostModal').style.display = 'block';
        }

        async function createPost() {
            const formData = new FormData();
            formData.append('teacher_id', teacherData.id);
            formData.append('title', document.getElementById('postTitle').value);
            formData.append('content', document.getElementById('postContent').value);
            formData.append('link_url', document.getElementById('postLink').value);
            if (document.getElementById('postImage').files[0]) formData.append('image', document.getElementById('postImage').files[0]);
            if (document.getElementById('postFile').files[0]) formData.append('file', document.getElementById('postFile').files[0]);
            const res = await fetch('/api/post/create', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) { alert('تم نشر الدرس بنجاح'); closeModal(); loadPosts(); }
            else alert('خطأ: ' + data.error);
        }

        async function loadOffers() {
            const res = await fetch(`/api/teacher/offers/${teacherData.id}`);
            const offers = await res.json();
            const container = document.getElementById('offersList');
            if (offers.length === 0) { container.innerHTML = '<p style="text-align:center">لا توجد عروض حالياً</p>'; return; }
            let html = '';
            for (const offer of offers) {
                const offerDate = new Date(offer.offer_date);
                html += `<div class="card">
                    <h3>${offer.subject_name}</h3>
                    <p><i class="fas fa-calendar"></i> ${offerDate.toLocaleString('ar')}</p>
                    <p><i class="fas fa-clock"></i> ${offer.duration} دقيقة</p>
                    <p><i class="fas fa-money-bill"></i> ${offer.is_free ? 'مجانية' : offer.price + ' دج'}</p>
                    <span class="status-badge">${offer.status === 'upcoming' ? 'قادم' : (offer.status === 'live' ? 'بث مباشر' : 'منتهية')}</span>
                    ${offer.status === 'upcoming' ? `<button class="create-btn" onclick="enterStream(${offer.id})" style="background:#0f5cbf; margin-top:10px">بدء البث</button>` : ''}
                    <button class="delete-btn" onclick="deleteOffer(${offer.id})"><i class="fas fa-trash"></i> حذف</button>
                </div>`;
            }
            container.innerHTML = html;
        }

        async function enterStream(offerId) { window.open(`/api/enter-teacher-stream/${offerId}/${teacherData.id}`, '_blank'); }
        async function deleteOffer(offerId) { if (confirm('حذف هذا العرض؟')) { await fetch(`/api/offer/delete/${offerId}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ teacher_id: teacherData.id }) }); loadOffers(); } }

        function showCreateOfferModal() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('createOfferModal').style.display = 'block';
        }

        function togglePrice() { document.getElementById('price').disabled = document.getElementById('isFree').checked; }
        async function createOffer() {
            const data = { teacher_id: teacherData.id, subject_name: document.getElementById('subjectName').value, duration: document.getElementById('duration').value, offer_date: document.getElementById('offerDate').value, is_free: document.getElementById('isFree').checked, price: document.getElementById('isFree').checked ? 0 : document.getElementById('price').value };
            const res = await fetch('/api/offer/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const result = await res.json();
            if (result.success) { alert('تم إنشاء العرض'); closeModal(); loadOffers(); }
            else alert('خطأ: ' + result.error);
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function logout() { localStorage.clear(); window.location.href = '/'; }

        loadProfile();
    </script>
</body>
</html>
