<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تعليمية جزائرية | دروس خصوصية عبر الفيديو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%); min-height: 100vh; }
        .navbar { background: white; padding: 15px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.8rem; font-weight: 800; }
        .logo i { color: #0f5cbf; margin-left: 10px; }
        .nav-links a { text-decoration: none; color: #4a5568; margin-right: 25px; font-weight: 600; cursor: pointer; }
        .hero { max-width: 1200px; margin: 50px auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .hero-content h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .hero-content .highlight { color: #0f5cbf; }
        .btn-primary { background: #0f5cbf; color: white; border: none; padding: 12px 30px; border-radius: 40px; cursor: pointer; }
        .btn-outline { background: transparent; border: 2px solid #0f5cbf; color: #0f5cbf; padding: 10px 28px; border-radius: 40px; cursor: pointer; }
        .form-section { max-width: 600px; margin: 50px auto; padding: 0 20px; }
        .form-tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 25px; background: #e2e8f0; border: none; border-radius: 40px; cursor: pointer; }
        .tab-btn.active { background: #0f5cbf; color: white; }
        .form-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .form-container input, .form-container select, .form-container textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 12px; font-family: 'Cairo', sans-serif; }
        .form-container input[type="file"] { padding: 8px; }
        footer { text-align: center; padding: 30px; background: #1e2a3e; color: #94a3b8; margin-top: 50px; }
        .live-badge { background: #ef4444; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-chalkboard-user"></i><span>منصة<span class="highlight"> التعليم</span></span></div>
            <div class="nav-links"><a onclick="showHome()">الرئيسية</a><a onclick="showLiveStreams()">بث مباشر <span id="liveCount" class="live-badge" style="display:none">0</span></a><a onclick="showLogin()">تسجيل الدخول</a></div>
        </div>
    </nav>
    <main>
        <section id="homeSection" class="hero">
            <div class="hero-content"><h1>تعلم مع أفضل الأساتذة <span class="highlight">في الجزائر</span></h1><p>دروس خصوصية عبر الفيديو مع نخبة من الأساتذة المعتمدين</p><div class="hero-buttons"><button class="btn-primary" onclick="showTeacherRegister()"><i class="fas fa-chalkboard-user"></i> انضم كأستاذ</button><button class="btn-outline" onclick="showLogin()"><i class="fas fa-sign-in-alt"></i> تسجيل دخول</button></div></div>
            <div class="hero-image"><i class="fas fa-laptop-code" style="font-size:250px; color:#0f5cbf20;"></i></div>
        </section>
        <section id="liveSection" class="form-section" style="display:none"><h2 style="text-align:center">🔴 بث مباشر الآن</h2><div id="liveOffersList" class="offers-grid" style="display:grid; gap:20px; margin-top:20px;"></div></section>
        <section id="loginSection" class="form-section" style="display:none">
            <div class="form-tabs"><button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button><button class="tab-btn" onclick="switchTab('student-register')">تسجيل طالب</button><button class="tab-btn" onclick="switchTab('teacher-register')">تسجيل أستاذ</button></div>
            <div id="loginTab" class="form-container"><h3>تسجيل الدخول</h3><input type="email" id="loginEmail" placeholder="البريد الإلكتروني"><input type="password" id="loginPassword" placeholder="كلمة المرور"><select id="loginRole"><option value="student">طالب</option><option value="teacher">أستاذ</option></select><button class="btn-primary" onclick="login()">دخول</button></div>
            <div id="studentRegisterTab" class="form-container" style="display:none"><h3>تسجيل طالب جديد</h3><input type="text" id="studentName" placeholder="الاسم الكامل"><input type="email" id="studentEmail" placeholder="البريد الإلكتروني"><input type="password" id="studentPassword" placeholder="كلمة المرور"><input type="tel" id="studentPhone" placeholder="رقم الهاتف"><button class="btn-primary" onclick="registerStudent()">تسجيل</button></div>
            <div id="teacherRegisterTab" class="form-container" style="display:none"><h3>تقديم طلب أستاذ</h3><input type="text" id="teacherName" placeholder="الاسم الكامل" required><input type="email" id="teacherEmail" placeholder="البريد الإلكتروني" required><input type="password" id="teacherPassword" placeholder="كلمة المرور" required><input type="tel" id="teacherPhone" placeholder="رقم الهاتف" required><input type="text" id="teacherSpecialization" placeholder="التخصص (مثال: رياضيات، فيزياء)" required><textarea id="teacherBio" placeholder="نبذة عنك وخبراتك" required></textarea><input type="text" id="teacherExperience" placeholder="سنوات الخبرة" required><label><i class="fas fa-user"></i> الصورة الشخصية</label><input type="file" id="profileImage" accept="image/*" required><label><i class="fas fa-graduation-cap"></i> صورة الدبلوم/الشهادة</label><input type="file" id="diplomaImage" accept="image/*" required><label><i class="fas fa-id-card"></i> صورة بطاقة الهوية</label><input type="file" id="idImage" accept="image/*" required><button class="btn-primary" onclick="registerTeacher()">تقديم الطلب</button></div>
        </section>
    </main>
    <footer><p>© 2024 منصة التعليم الجزائرية - جميع الحقوق محفوظة</p><p><i class="fas fa-credit-card"></i> الدفع عبر شارجيلي | EDAHABIA | CCP</p></footer>
    <script>
        async function showLiveStreams() { document.getElementById('homeSection').style.display = 'none'; document.getElementById('loginSection').style.display = 'none'; document.getElementById('liveSection').style.display = 'block'; await loadLiveStreams(); setInterval(loadLiveStreams, 5000); }
        async function loadLiveStreams() { const res = await fetch('/api/live-offers'); const offers = await res.json(); document.getElementById('liveCount').style.display = offers.length ? 'inline-block' : 'none'; document.getElementById('liveCount').innerText = offers.length; const container = document.getElementById('liveOffersList'); if (!offers.length) { container.innerHTML = '<p style="text-align:center">لا يوجد بث مباشر حالياً</p>'; return; } let html = ''; offers.forEach(o => { html += `<div style="background:white; border-radius:20px; padding:20px;"><h3>${o.teacher_name}</h3><p><i class="fas fa-book"></i> ${o.subject_name}</p><p><i class="fas fa-tag"></i> ${o.is_free ? 'مجانية' : o.price + ' دج'}</p><span style="background:#ef4444; color:white; padding:5px 10px; border-radius:15px;">🔴 بث مباشر</span><button class="btn-primary" style="margin-top:15px; width:100%" onclick="joinLiveStream(${o.id}, ${o.is_free})"><i class="fas fa-video"></i> انضم الآن</button></div>`; }); container.innerHTML = html; }
        async function joinLiveStream(offerId, isFree) { const studentToken = localStorage.getItem('studentToken'); if (!studentToken) { alert('يرجى تسجيل الدخول كطالب أولاً'); showLogin(); return; } if (isFree === 1) { const studentData = JSON.parse(localStorage.getItem('studentData')); const bookRes = await fetch('/api/booking/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ offer_id: offerId, student_id: studentData.id }) }); const bookData = await bookRes.json(); if (bookData.success) { window.open(`/api/join-stream/${offerId}/${studentData.id}`, '_blank'); } else { alert(bookData.error); } } else { window.location.href = '/student-dashboard.html'; } }
        function showHome() { document.getElementById('homeSection').style.display = 'flex'; document.getElementById('loginSection').style.display = 'none'; document.getElementById('liveSection').style.display = 'none'; }
        function showLogin() { document.getElementById('homeSection').style.display = 'none'; document.getElementById('liveSection').style.display = 'none'; document.getElementById('loginSection').style.display = 'block'; switchTab('login'); }
        function showTeacherRegister() { document.getElementById('homeSection').style.display = 'none'; document.getElementById('liveSection').style.display = 'none'; document.getElementById('loginSection').style.display = 'block'; switchTab('teacher-register'); }
        function switchTab(tab) { document.getElementById('loginTab').style.display = 'none'; document.getElementById('studentRegisterTab').style.display = 'none'; document.getElementById('teacherRegisterTab').style.display = 'none'; if (tab === 'login') document.getElementById('loginTab').style.display = 'block'; else if (tab === 'student-register') document.getElementById('studentRegisterTab').style.display = 'block'; else document.getElementById('teacherRegisterTab').style.display = 'block'; document.querySelectorAll('.tab-btn').forEach((btn, i) => { btn.classList.remove('active'); if ((tab === 'login' && i === 0) || (tab === 'student-register' && i === 1) || (tab === 'teacher-register' && i === 2)) btn.classList.add('active'); }); }
        async function login() { const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value, role = document.getElementById('loginRole').value; const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, role }) }); const data = await res.json(); if (data.success) { if (email === 'admin@platform.com') { localStorage.setItem('adminToken', data.token); window.location.href = '/admin.html'; } else if (role === 'teacher') { localStorage.setItem('teacherToken', data.token); localStorage.setItem('teacherData', JSON.stringify(data.user)); window.location.href = '/teacher-dashboard.html'; } else { localStorage.setItem('studentToken', data.token); localStorage.setItem('studentData', JSON.stringify(data.user)); window.location.href = '/student-dashboard.html'; } } else { alert(data.error); } }
        async function registerStudent() { const full_name = document.getElementById('studentName').value, email = document.getElementById('studentEmail').value, password = document.getElementById('studentPassword').value, phone = document.getElementById('studentPhone').value; const res = await fetch('/api/student/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ full_name, email, password, phone }) }); const data = await res.json(); if (data.success) { alert('تم التسجيل بنجاح'); switchTab('login'); } else { alert(data.error); } }
        async function registerTeacher() { const formData = new FormData(); formData.append('full_name', document.getElementById('teacherName').value); formData.append('email', document.getElementById('teacherEmail').value); formData.append('password', document.getElementById('teacherPassword').value); formData.append('phone', document.getElementById('teacherPhone').value); formData.append('specialization', document.getElementById('teacherSpecialization').value); formData.append('bio', document.getElementById('teacherBio').value); formData.append('experience', document.getElementById('teacherExperience').value); formData.append('profile_image', document.getElementById('profileImage').files[0]); formData.append('diploma_image', document.getElementById('diplomaImage').files[0]); formData.append('id_image', document.getElementById('idImage').files[0]); const res = await fetch('/api/teacher/register', { method: 'POST', body: formData }); const data = await res.json(); if (data.success) { alert('تم إرسال طلبك بنجاح! سيتم مراجعته من قبل الإدارة'); switchTab('login'); } else { alert(data.error); } }
    </script>
</body>
</html>
