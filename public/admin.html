<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير | منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .admin-header { background: linear-gradient(135deg, #1e3c72, #0f5cbf); color: white; padding: 20px; border-radius: 20px; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stat-card i { font-size: 40px; color: #0f5cbf; }
        .teachers-table { background: white; border-radius: 20px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f0f4f8; }
        .btn-approve { background: #10b981; color: white; border: none; padding: 6px 15px; border-radius: 20px; cursor: pointer; margin: 3px; }
        .btn-reject { background: #ef4444; color: white; border: none; padding: 6px 15px; border-radius: 20px; cursor: pointer; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; float: left; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #e2e8f0; border-radius: 30px; cursor: pointer; }
        .tab.active { background: #0f5cbf; color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> لوحة تحكم المدير</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('pending')">طلبات الأساتذة <span id="pendingCount"></span></div>
            <div class="tab" onclick="showTab('approved')">الأساتذة المقبولون</div>
        </div>

        <div id="pendingTab" class="teachers-table">
            <h3>الأساتذة في انتظار المراجعة</h3>
            <div id="pendingTeachersList"></div>
        </div>

        <div id="approvedTab" class="teachers-table" style="display: none;">
            <h3>الأساتذة المقبولون</h3>
            <div id="approvedTeachersList"></div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminData');
            window.location.href = '/';
        }

        async function loadPendingTeachers() {
            const res = await fetch('/api/admin/pending-teachers');
            const teachers = await res.json();
            const container = document.getElementById('pendingTeachersList');
            document.getElementById('pendingCount').innerHTML = `(${teachers.length})`;
            
            if (teachers.length === 0) {
                container.innerHTML = '<p>لا يوجد أساتذة بانتظار المراجعة</p>';
                return;
            }

            let html = '<table><tr><th>الاسم</th><th>البريد</th><th>الهاتف</th><th>التخصص</th><th>السعر المقترح</th><th>الإجراءات</th></tr>';
            teachers.forEach(t => {
                html += `<tr>
                    <td>${t.full_name}</td>
                    <td>${t.email}</td>
                    <td>${t.phone || '-'}</td>
                    <td>${t.specialization || '-'}</td>
                    <td>${t.hourly_rate} دج</td>
                    <td>
                        <button class="btn-approve" onclick="approveTeacher(${t.id})">قبول</button>
                        <button class="btn-reject" onclick="rejectTeacher(${t.id})">رفض</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        async function loadApprovedTeachers() {
            const res = await fetch('/api/admin/approved-teachers');
            const teachers = await res.json();
            const container = document.getElementById('approvedTeachersList');
            
            if (teachers.length === 0) {
                container.innerHTML = '<p>لا يوجد أساتذة مقبولون بعد</p>';
                return;
            }

            let html = '<table><tr><th>الاسم</th><th>البريد</th><th>الهاتف</th><th>التخصص</th><th>السعر</th></tr>';
            teachers.forEach(t => {
                html += `<tr>
                    <td>${t.full_name}</td>
                    <td>${t.email}</td>
                    <td>${t.phone || '-'}</td>
                    <td>${t.specialization || '-'}</td>
                    <td>${t.hourly_rate} دج</td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        async function approveTeacher(id) {
            const res = await fetch(`/api/admin/approve-teacher/${id}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                alert('تم قبول الأستاذ');
                loadPendingTeachers();
                loadApprovedTeachers();
            }
        }

        async function rejectTeacher(id) {
            if (confirm('هل أنت متأكد من رفض هذا الأستاذ؟')) {
                const res = await fetch(`/api/admin/reject-teacher/${id}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert('تم رفض الأستاذ');
                    loadPendingTeachers();
                }
            }
        }

        function showTab(tab) {
            if (tab === 'pending') {
                document.getElementById('pendingTab').style.display = 'block';
                document.getElementById('approvedTab').style.display = 'none';
                loadPendingTeachers();
            } else {
                document.getElementById('pendingTab').style.display = 'none';
                document.getElementById('approvedTab').style.display = 'block';
                loadApprovedTeachers();
            }
        }

        loadPendingTeachers();
        loadApprovedTeachers();
    </script>
</body>
</html>
