<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير - منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        .admin-container { max-width: 1400px; margin: 30px auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1e3c72, #0f5cbf); color: white; padding: 20px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 25px; background: #e2e8f0; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #0f5cbf; color: white; }
        .teachers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .teacher-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .teacher-image { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
        .btn-approve { background: #10b981; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin: 5px; }
        .btn-reject { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin: 5px; }
        .btn-delete { background: #dc2626; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin: 5px; }
        .view-profile { background: #0f5cbf; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin: 5px; text-decoration: none; display: inline-block; }
        .documents { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .doc-link { background: #e2e8f0; padding: 5px 10px; border-radius: 10px; text-decoration: none; color: #0f5cbf; font-size: 12px; }
        .reject-reason { width: 100%; padding: 8px; margin-top: 10px; border: 1px solid #cbd5e1; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h1><i class="fas fa-crown"></i> لوحة تحكم المدير</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="showTab('pending')">طلبات الأساتذة <span id="pendingCount"></span></div>
            <div class="tab" onclick="showTab('approved')">الأساتذة المعتمدون</div>
        </div>
        <div id="pendingTab"><div id="pendingTeachers" class="teachers-grid"></div></div>
        <div id="approvedTab" style="display:none"><div id="approvedTeachers" class="teachers-grid"></div></div>
    </div>
    <script>
        let token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/';

        async function loadPending() {
            const res = await fetch('/api/admin/pending-teachers');
            const teachers = await res.json();
            document.getElementById('pendingCount').innerHTML = `(${teachers.length})`;
            const container = document.getElementById('pendingTeachers');
            if (teachers.length === 0) { container.innerHTML = '<p>لا يوجد أساتذة بانتظار المراجعة</p>'; return; }
            let html = '';
            teachers.forEach(t => {
                html += `<div class="teacher-card">
                    <img src="/uploads/${t.profile_image}" class="teacher-image">
                    <h3>${t.full_name}</h3>
                    <p><i class="fas fa-envelope"></i> ${t.email}</p>
                    <p><i class="fas fa-phone"></i> ${t.phone}</p>
                    <p><i class="fas fa-book"></i> ${t.specialization}</p>
                    <p><i class="fas fa-briefcase"></i> ${t.experience || 'غير مذكور'}</p>
                    <div class="documents">
                        <a href="/uploads/${t.diploma_image}" target="_blank" class="doc-link"><i class="fas fa-graduation-cap"></i> الدبلوم</a>
                        <a href="/uploads/${t.id_image}" target="_blank" class="doc-link"><i class="fas fa-id-card"></i> بطاقة الهوية</a>
                    </div>
                    <div>
                        <button class="btn-approve" onclick="approveTeacher(${t.id})">قبول</button>
                        <button class="btn-reject" onclick="showRejectReason(${t.id})">رفض</button>
                    </div>
                    <input type="text" id="rejectReason${t.id}" class="reject-reason" placeholder="سبب الرفض">
                </div>`;
            });
            container.innerHTML = html;
        }

        async function loadApproved() {
            const res = await fetch('/api/admin/approved-teachers');
            const teachers = await res.json();
            const container = document.getElementById('approvedTeachers');
            if (teachers.length === 0) { container.innerHTML = '<p>لا يوجد أساتذة مقبولون</p>'; return; }
            let html = '';
            teachers.forEach(t => {
                html += `<div class="teacher-card">
                    <img src="/uploads/${t.profile_image}" class="teacher-image">
                    <h3>${t.full_name}</h3>
                    <p><i class="fas fa-book"></i> ${t.specialization}</p>
                    <p><i class="fas fa-briefcase"></i> ${t.experience || 'غير مذكور'} سنة</p>
                    <div>
                        <a href="/teacher-profile.html?id=${t.id}" target="_blank" class="view-profile"><i class="fas fa-eye"></i> عرض الصفحة</a>
                        <button class="btn-delete" onclick="deleteTeacher(${t.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function approveTeacher(id) {
            await fetch(`/api/admin/approve-teacher/${id}`, { method: 'POST' });
            alert('تم قبول الأستاذ');
            loadPending(); loadApproved();
        }

        function showRejectReason(id) {
            const input = document.getElementById(`rejectReason${id}`);
            input.style.display = input.style.display === 'none' ? 'block' : 'none';
            if (input.style.display === 'block') {
                input.onblur = async () => {
                    if (input.value) {
                        await fetch(`/api/admin/reject-teacher/${id}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reason: input.value }) });
                        alert('تم رفض الأستاذ'); loadPending();
                    }
                };
            }
        }

        async function deleteTeacher(id) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذا الأستاذ؟ سيتم حذف جميع منشوراته وعروضه.')) {
                const res = await fetch(`/api/admin/delete-teacher/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) { alert('تم حذف الأستاذ'); loadApproved(); }
                else alert('خطأ: ' + data.error);
            }
        }

        function showTab(tab) {
            document.getElementById('pendingTab').style.display = 'none';
            document.getElementById('approvedTab').style.display = 'none';
            if (tab === 'pending') { document.getElementById('pendingTab').style.display = 'block'; loadPending(); }
            else { document.getElementById('approvedTab').style.display = 'block'; loadApproved(); }
            document.querySelectorAll('.tab').forEach((t, i) => { t.classList.remove('active'); if ((tab === 'pending' && i === 0) || (tab === 'approved' && i === 1)) t.classList.add('active'); });
        }

        function logout() { localStorage.removeItem('adminToken'); window.location.href = '/'; }
        loadPending(); loadApproved();
    </script>
</body>
</html>
