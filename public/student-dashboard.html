<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللوحة الرئيسية للطالب | منصة التعليم للبكلوريا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        .dashboard { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1e3c72, #0f5cbf); color: white; padding: 20px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .section-title { margin: 20px 0 15px 0; color: #1e3c72; }
        .offers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .offer-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .offer-card:hover { transform: translateY(-3px); }
        .offer-card h3 { color: #0f5cbf; margin-bottom: 10px; }
        .book-btn, .join-btn, .pay-btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: 600; }
        .book-btn { background: #0f5cbf; color: white; }
        .join-btn { background: #10b981; color: white; }
        .pay-btn { background: #f59e0b; color: white; }
        .waiting-message { background: #fef3c7; padding: 10px; border-radius: 10px; margin-top: 10px; text-align: center; color: #92400e; }
        .my-sessions { background: white; border-radius: 20px; padding: 20px; margin-top: 40px; }
        .session-item { border-bottom: 1px solid #e2e8f0; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .payment-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; z-index: 1000; width: 90%; max-width: 400px; text-align: center; display: none; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 12px; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fed7aa; color: #92400e; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1><i class="fas fa-user-graduate"></i> لوحة الطالب</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>

        <h2 class="section-title"><i class="fas fa-calendar-alt"></i> العروض المتاحة (بث مباشر)</h2>
        <div id="offersList" class="offers-grid"></div>

        <div class="my-sessions">
            <h2 class="section-title"><i class="fas fa-clock"></i> حصصي المسجلة</h2>
            <div id="mySessions"></div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="paymentModal" class="payment-modal">
        <h3><i class="fas fa-credit-card"></i> الدفع عبر شارجيلي</h3>
        <p id="paymentInfo"></p>
        <button id="payNowBtn" class="book-btn" style="background:#f59e0b">الدفع الآن</button>
        <button onclick="closePaymentModal()" class="book-btn" style="background:#e2e8f0; color:#333; margin-top:10px;">إلغاء</button>
    </div>

    <script>
        let studentData = JSON.parse(localStorage.getItem('studentData') || '{}');
        if (!studentData.id) window.location.href = '/';
        let currentPaymentSession = null;

        async function loadOffers() {
            const res = await fetch('/api/offers');
            const offers = await res.json();
            const container = document.getElementById('offersList');
            
            if (offers.length === 0) {
                container.innerHTML = '<p style="text-align:center">لا توجد عروض متاحة حالياً</p>';
                return;
            }
            
            let html = '';
            for (const offer of offers) {
                const offerDate = new Date(offer.offer_date);
                const isFree = offer.is_free === 1;
                const priceText = isFree ? 'مجانية' : offer.price + ' دج';
                
                html += `<div class="offer-card">
                    <h3><i class="fas fa-chalkboard-user"></i> ${offer.teacher_name}</h3>
                    <p><i class="fas fa-book"></i> <strong>${offer.subject_name}</strong></p>
                    <p><i class="fas fa-calendar"></i> ${offerDate.toLocaleString('ar')}</p>
                    <p><i class="fas fa-clock"></i> ${offer.duration} دقيقة</p>
                    <p><i class="fas fa-tag"></i> ${priceText}</p>
                    <button class="book-btn" onclick="bookOffer(${offer.id}, ${isFree ? 0 : offer.price})"><i class="fas fa-calendar-plus"></i> ${isFree ? 'تسجيل مجاني' : 'حجز الحصة'}</button>
                </div>`;
            }
            container.innerHTML = html;
        }

        async function bookOffer(offerId, price) {
            // تسجيل الطالب في العرض
            const res = await fetch('/api/booking/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ offer_id: offerId, student_id: studentData.id })
            });
            const data = await res.json();
            
            if (data.success) {
                if (price === 0) {
                    // حصة مجانية - إضافة مباشرة إلى غرفة الانتظار
                    alert('تم تسجيلك في الحصة المجانية! سيتم إضافتك إلى غرفة الانتظار.');
                    loadMySessions();
                    checkStreamStatus(offerId);
                } else {
                    // حصة مدفوعة - طلب الدفع
                    currentPaymentSession = { session_id: data.session_id, offer_id: offerId, amount: price };
                    showPaymentModal(price);
                }
            } else {
                alert(data.error || 'حدث خطأ');
            }
        }

        function showPaymentModal(amount) {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('paymentModal').style.display = 'block';
            document.getElementById('paymentInfo').innerHTML = `💰 قيمة الحصة: <strong>${amount} دج</strong><br>🔐 بعد الدفع، سيتم إضافتك إلى غرفة الانتظار.`;
            
            document.getElementById('payNowBtn').onclick = async () => {
                const paymentRes = await fetch('/api/create-chargily-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: currentPaymentSession.session_id,
                        amount: currentPaymentSession.amount,
                        student_name: studentData.name,
                        student_email: studentData.email
                    })
                });
                const paymentData = await paymentRes.json();
                if (paymentData.success) {
                    alert('✅ تم إنشاء طلب الدفع. جارٍ تأكيد الدفع...');
                    setTimeout(async () => {
                        await fetch(`/api/payment/confirm/${paymentData.payment_id}`, { method: 'POST' });
                        alert('تم تأكيد الدفع! تم إضافتك إلى غرفة الانتظار.');
                        closePaymentModal();
                        loadMySessions();
                        checkStreamStatus(currentPaymentSession.offer_id);
                    }, 2000);
                }
                closePaymentModal();
            };
        }

        function closePaymentModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('paymentModal').style.display = 'none';
        }

        async function loadMySessions() {
            const res = await fetch(`/api/student/bookings/${studentData.id}`);
            const bookings = await res.json();
            const container = document.getElementById('mySessions');
            
            if (bookings.length === 0) {
                container.innerHTML = '<p>لا توجد حصص مسجلة</p>';
                return;
            }
            
            let html = '';
            for (const booking of bookings) {
                const offerDate = new Date(booking.offer_date);
                const isPaid = booking.is_free === 1 || booking.payment_status === 'paid';
                const statusText = isPaid ? 'مدفوع/مؤكد' : 'بانتظار الدفع';
                const statusClass = isPaid ? 'status-paid' : 'status-pending';
                
                html += `<div class="session-item">
                    <div>
                        <strong>${booking.subject_name}</strong><br>
                        <small>الأستاذ: ${booking.teacher_name}</small><br>
                        <small>${offerDate.toLocaleString('ar')}</small>
                    </div>
                    <div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        ${isPaid ? `<button class="join-btn" onclick="checkAndJoin(${booking.offer_id})" style="margin-top:5px; width:auto; padding:5px 15px;"><i class="fas fa-video"></i> انتظر البث</button>` : 
                                  `<button class="pay-btn" onclick="retryPayment(${booking.id}, ${booking.price})">إتمام الدفع</button>`}
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        async function checkAndJoin(offerId) {
            const res = await fetch(`/api/student/stream-status/${offerId}/${studentData.id}`);
            const data = await res.json();
            
            if (data.can_join) {
                window.open(`/api/join-stream/${offerId}/${studentData.id}`, '_blank');
            } else if (data.is_waiting) {
                alert('⏳ أنت في غرفة الانتظار. يرجى الانتظار حتى يبدأ الأستاذ البث المباشر.');
            } else if (data.payment_required) {
                alert('يرجى إتمام الدفع أولاً');
            } else {
                alert(data.error || 'لا يمكن الانضمام حالياً');
            }
        }

        async function checkStreamStatus(offerId) {
            const checkInterval = setInterval(async () => {
                const res = await fetch(`/api/student/stream-status/${offerId}/${studentData.id}`);
                const data = await res.json();
                if (data.can_join) {
                    clearInterval(checkInterval);
                    if (confirm('🎉 بدأ البث المباشر! هل تريد الانضمام الآن؟')) {
                        window.open(`/api/join-stream/${offerId}/${studentData.id}`, '_blank');
                    }
                }
            }, 5000);
            setTimeout(() => clearInterval(checkInterval), 30 * 60 * 1000);
        }

        function retryPayment(sessionId, amount) {
            currentPaymentSession = { session_id: sessionId, amount: amount };
            showPaymentModal(amount);
        }

        function logout() {
            localStorage.removeItem('studentToken');
            localStorage.removeItem('studentData');
            window.location.href = '/';
        }

        loadOffers();
        loadMySessions();
        setInterval(() => { loadMySessions(); }, 10000);
    </script>
</body>
</html>
