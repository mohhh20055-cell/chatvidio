<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطالب - منصة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        .dashboard { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1e3c72, #0f5cbf); color: white; padding: 20px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .offers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .offer-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .book-btn { background: #0f5cbf; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: 600; }
        .my-sessions { background: white; border-radius: 20px; padding: 20px; margin-top: 40px; }
        .session-item { border-bottom: 1px solid #e2e8f0; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .join-btn { background: #10b981; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 12px; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fed7aa; color: #92400e; }
        .notification-toast { position: fixed; bottom: 30px; right: 30px; background: #10b981; color: white; padding: 15px 25px; border-radius: 15px; z-index: 2000; animation: slideIn 0.5s ease; display: none; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .view-profile-btn { background: #0f5cbf; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-top: 5px; }
        .teacher-info { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .teacher-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1><i class="fas fa-user-graduate"></i> لوحة الطالب</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>
        <h2 style="margin-bottom: 20px;"><i class="fas fa-calendar-alt"></i> العروض المتاحة</h2>
        <div id="offersList" class="offers-grid"></div>
        <div class="my-sessions">
            <h2><i class="fas fa-clock"></i> حصصي المسجلة</h2>
            <div id="mySessions"></div>
        </div>
    </div>

    <div id="notificationToast" class="notification-toast"></div>

    <script>
        // التحقق من وجود studentToken و role صحيح
        let studentToken = localStorage.getItem('studentToken');
        let userData = JSON.parse(localStorage.getItem('userData') || '{}');
        
        if (!studentToken && userData.role !== 'student') {
            window.location.href = '/';
        }
        
        let studentData = userData;
        let activeStreamChecker = {};

        function showNotification(message, type = 'success') {
            const toast = document.getElementById('notificationToast');
            toast.style.background = type === 'success' ? '#10b981' : (type === 'warning' ? '#f59e0b' : '#ef4444');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        function viewTeacherProfile(teacherId) {
            window.open(`/teacher-profile.html?id=${teacherId}`, '_blank');
        }

        async function loadOffers() {
            const res = await fetch('/api/offers');
            const offers = await res.json();
            const container = document.getElementById('offersList');
            if (offers.length === 0) { container.innerHTML = '<p style="text-align:center">لا توجد عروض متاحة حالياً</p>'; return; }
            let html = '';
            for (const offer of offers) {
                const offerDate = new Date(offer.offer_date);
                const imageUrl = offer.profile_image ? `/uploads/${offer.profile_image}` : 'https://via.placeholder.com/60';
                html += `<div class="offer-card">
                    <div class="teacher-info" onclick="viewTeacherProfile(${offer.teacher_id})">
                        <img src="${imageUrl}" class="teacher-avatar">
                        <div><h3 style="margin-bottom: 5px;">${offer.teacher_name}</h3><p><i class="fas fa-book"></i> ${offer.specialization || 'تخصص عام'}</p></div>
                    </div>
                    <p><strong>${offer.subject_name}</strong></p>
                    <p><i class="fas fa-calendar"></i> ${offerDate.toLocaleString('ar')}</p>
                    <p><i class="fas fa-clock"></i> ${offer.duration} دقيقة</p>
                    <p><i class="fas fa-tag"></i> ${offer.is_free ? 'مجانية' : offer.price + ' دج'}</p>
                    <button class="book-btn" onclick="bookOffer(${offer.id}, ${offer.is_free ? 0 : offer.price})">${offer.is_free ? 'تسجيل مجاني' : 'حجز الحصة'}</button>
                    <button class="view-profile-btn" onclick="viewTeacherProfile(${offer.teacher_id})"><i class="fas fa-eye"></i> صفحة الأستاذ</button>
                </div>`;
            }
            container.innerHTML = html;
        }

        async function bookOffer(offerId, price) {
            showNotification('جاري معالجة طلبك...', 'warning');
            const res = await fetch('/api/booking/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ offer_id: offerId, student_id: studentData.id })
            });
            const data = await res.json();
            if (data.success) {
                if (price === 0 || data.is_free) {
                    showNotification('✅ تم تسجيلك بنجاح! في انتظار بدء البث.', 'success');
                    startWatchingStream(offerId);
                    loadMySessions();
                } else if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                }
            } else {
                showNotification(data.error || 'حدث خطأ', 'error');
            }
        }

        function startWatchingStream(offerId) {
            if (activeStreamChecker[offerId]) return;
            const checkInterval = setInterval(async () => {
                const res = await fetch(`/api/student/stream-status/${offerId}/${studentData.id}`);
                const data = await res.json();
                if (data.can_join === true) {
                    clearInterval(activeStreamChecker[offerId]);
                    delete activeStreamChecker[offerId];
                    showNotification('🎉 بدأ البث المباشر! جاري نقلك...', 'success');
                    setTimeout(() => { window.open(`/api/join-stream/${offerId}/${studentData.id}`, '_blank'); }, 1000);
                }
            }, 3000);
            activeStreamChecker[offerId] = checkInterval;
            setTimeout(() => { if (activeStreamChecker[offerId]) { clearInterval(activeStreamChecker[offerId]); delete activeStreamChecker[offerId]; } }, 30 * 60 * 1000);
        }

        async function loadMySessions() {
            const res = await fetch(`/api/student/bookings/${studentData.id}`);
            const bookings = await res.json();
            const container = document.getElementById('mySessions');
            if (bookings.length === 0) { container.innerHTML = '<p>لا توجد حصص مسجلة</p>'; return; }
            let html = '';
            for (const booking of bookings) {
                const offerDate = new Date(booking.offer_date);
                const isPaid = booking.is_free === 1 || booking.payment_status === 'paid';
                const isLive = booking.offer_status === 'live';
                const imageUrl = booking.teacher_image ? `/uploads/${booking.teacher_image}` : 'https://via.placeholder.com/40';
                html += `<div class="session-item">
                    <div style="display: flex; align-items: center; gap: 15px; cursor: pointer;" onclick="viewTeacherProfile(${booking.teacher_id})">
                        <img src="${imageUrl}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                        <div>
                            <strong>${booking.subject_name}</strong><br>
                            <small>الأستاذ: ${booking.teacher_name}</small><br>
                            <small>${offerDate.toLocaleString('ar')}</small>
                        </div>
                    </div>
                    <div>
                        <span class="status-badge ${isPaid ? 'status-paid' : 'status-pending'}">${isPaid ? (isLive ? 'بث مباشر' : 'مسجل') : 'بانتظار الدفع'}</span>
                        ${isLive && isPaid ? `<button class="join-btn" onclick="joinLiveStream(${booking.offer_id})"><i class="fas fa-video"></i> انضم</button>` : ''}
                        <button class="view-profile-btn" onclick="viewTeacherProfile(${booking.teacher_id})"><i class="fas fa-eye"></i> صفحة الأستاذ</button>
                    </div>
                </div>`;
                if (isPaid && !isLive && !activeStreamChecker[booking.offer_id]) { startWatchingStream(booking.offer_id); }
            }
            container.innerHTML = html;
        }

        function joinLiveStream(offerId) { window.open(`/api/join-stream/${offerId}/${studentData.id}`, '_blank'); }
        
        function logout() { 
            Object.values(activeStreamChecker).forEach(i => clearInterval(i)); 
            localStorage.clear(); 
            window.location.href = '/'; 
        }

        loadOffers(); 
        loadMySessions(); 
        setInterval(() => loadMySessions(), 10000);
    </script>
</body>
</html>
